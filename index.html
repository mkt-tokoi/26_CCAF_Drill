<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>CCAF ドリル</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--ink:#e2e8f0;--mut:#94a3b8;--line:#334155;
  --ok:#22c55e;--ng:#ef4444;--accent:#38bdf8;--warn:#f59e0b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  font-size:17px;line-height:1.6}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.wrap{max-width:760px;margin:0 auto;padding:14px 14px 40px}
h1{font-size:20px;margin:6px 0 2px}
.mut{color:var(--mut)}.sm{font-size:14px}.xs{font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:16px;margin:12px 0}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 14px;cursor:pointer;transition:.08s}
button:active{transform:scale(.985)}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.btn-row button{flex:1 1 auto}
.primary{background:var(--accent);color:#04263a;border-color:var(--accent);font-weight:700}
.chip{display:inline-block;padding:2px 9px;border-radius:999px;border:1px solid var(--line);
  font-size:12px;color:var(--mut);margin-right:6px}
.choice{display:block;width:100%;text-align:left;margin:9px 0;white-space:normal;line-height:1.5}
.choice .k{font-weight:700;color:var(--accent);margin-right:8px}
.choice.correct{border-color:var(--ok);background:rgba(34,197,94,.12)}
.choice.wrong{border-color:var(--ng);background:rgba(239,68,68,.12)}
.choice.dim{opacity:.55}
.choice:disabled{cursor:default}
.verdict{font-size:19px;font-weight:800;margin:4px 0}
.verdict.ok{color:var(--ok)}.verdict.ng{color:var(--ng)}
.time-ok{color:var(--ok)}.time-ng{color:var(--warn)}
.ja{color:var(--mut);font-size:14.5px;margin-top:3px}
.en{font-style:normal}
.explain{border-left:3px solid var(--accent);padding:8px 0 8px 12px;margin:12px 0;
  background:rgba(56,189,248,.06);border-radius:0 8px 8px 0}
.refs{color:var(--accent);font-size:13px;margin-top:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px}
.stat{background:#0b1322;border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
.stat b{display:block;font-size:22px}
.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
.timer{font-variant-numeric:tabular-nums;font-weight:700}
textarea{width:100%;min-height:160px;background:#0b1322;color:var(--ink);
  border:1px solid var(--line);border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:12px}
input[type=text]{width:100%;background:#0b1322;color:var(--ink);border:1px solid var(--line);
  border-radius:10px;padding:10px;font:inherit}
.seg{display:flex;flex-wrap:wrap;gap:6px}
.seg button{padding:8px 12px;font-size:14px}
.seg button.on{background:var(--accent);color:#04263a;border-color:var(--accent);font-weight:700}
a{color:var(--accent)}
details{margin:8px 0}summary{cursor:pointer;color:var(--accent)}
.hide{display:none}
.fab{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));
  width:52px;height:52px;border-radius:50%;font-size:22px;background:var(--card);
  border:1px solid var(--line);z-index:20}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<button class="fab" id="dictBtn" title="単語帳">📖</button>

<script>
const DATA = {"questions": [{"id": "S1-Q1", "scenario": "S1", "domain": "D1", "ts": "1.1", "stem_en": "Your agent sometimes stops mid-task. Logs show your loop exits whenever the assistant's response contains the phrase \"I will now process the refund,\" because your code treats any assistant text as a completion signal. What is the correct loop termination design?", "stem_ja": "エージェントがタスク途中で停止することがある。ログによると、コードが assistant のテキストを完了シグナルとして扱っているため、応答に「これから返金を処理します」という文言が含まれるとループが終了している。正しいループ終了設計は？", "choices": [{"k": "A", "en": "Continue the loop while `stop_reason` is `\"tool_use\"` and terminate when it is `\"end_turn\"`, treating the API's structured signal as the single source of truth.", "ja": "`stop_reason` が `\"tool_use\"` なら継続、`\"end_turn\"` なら終了し、API の構造化シグナルを唯一の真実の源とする"}, {"k": "B", "en": "Continue the loop while the response text does not contain a completion phrase such as \"done,\" \"resolved,\" or \"all set,\" matching case-insensitively to catch variants.", "ja": "応答テキストに \"done\"・\"resolved\"・\"all set\" 等の完了フレーズが（大文字小文字を無視して変種も拾うよう）含まれない間ループを継続"}, {"k": "C", "en": "Set a hard maximum of 10 iterations as the primary stopping mechanism, since a fixed iteration budget guarantees the loop always terminates within bounded latency.", "ja": "固定イテレーション予算が常に有界レイテンシ内での終了を保証するため、最大 10 イテレーションを主たる停止機構にする"}, {"k": "D", "en": "Terminate whenever the response contains text content and no further tool calls are pending, treating any narrative reply as the agent's final answer.", "ja": "応答にテキストがあり保留中のツール呼び出しがない場合は常に終了し、あらゆる説明的応答を最終回答とみなす"}], "correct": "A", "explain_ja": "`stop_reason` が agentic loop の唯一信頼できる制御シグナル。B・D は自然言語シグナル・テキスト有無の解析というアンチパターン（assistant はツール呼び出しと同時にテキストを出力し得る）。C の上限は安全弁としては有効だが「主たる」停止機構にしてはならない。", "refs": "[matrix S2-D1 / anti-patterns D1-1,2,3]"}, {"id": "S1-Q2", "scenario": "S1", "domain": "D1", "ts": "1.5", "stem_en": "Compliance requires that refunds over $500 must never be executed by the agent and must instead go to a human. In testing, prompt instructions achieve 97% compliance. What should you do before production?", "stem_ja": "コンプライアンス上、$500 超の返金はエージェントが実行してはならず、人間に回す必要がある。テストではプロンプト指示で 97% の遵守率を達成した。本番前に何をすべきか？", "choices": [{"k": "A", "en": "Strengthen the system prompt with capitalized warnings, restate the $500 rule at the start and end, and add an explicit reasoning checklist the model must follow before any refund.", "ja": "system prompt を大文字警告で強化し、$500 ルールを冒頭と末尾で再掲し、返金前にモデルが従うべき明示的な推論チェックリストを追加する"}, {"k": "B", "en": "Add a broad set of few-shot examples showing the agent correctly refusing large refunds across varied phrasings, edge amounts, and adversarial customer pushback.", "ja": "多様な言い回し・境界金額・敵対的な顧客の押し返しにわたって高額返金を正しく拒否する幅広い few-shot 例を追加する"}, {"k": "C", "en": "Add a `PreToolUse` hook that intercepts `process_refund` calls, deterministically blocks any amount over $500, and redirects the request into the human escalation workflow.", "ja": "`process_refund` 呼び出しをインターセプトし $500 超を決定論的にブロックして人間のエスカレーションフローへリダイレクトする `PreToolUse` hook を追加する"}, {"k": "D", "en": "Lower the refund threshold to $400 in the prompt so borderline cases keep a safety margin, and log every refund near the limit for later compliance review.", "ja": "境界ケースの安全マージンとしてプロンプト上の閾値を $400 に下げ、上限付近の全返金を後のコンプライアンスレビュー用にログする"}], "correct": "C", "explain_ja": "97% は「3% 失敗する」ということ。金銭的影響のあるビジネスルールには決定論的保証が必要で、hook によるプログラム的強制が唯一それを提供する。A・B はプロンプトの確率的遵守の改善にすぎず、D は失敗率そのものを変えない。", "refs": "[anti-patterns D1-7 / 公式 Q1 類題]"}, {"id": "S1-Q3", "scenario": "S1", "domain": "D1", "ts": "1.5", "stem_en": "Your MCP tools return dates in mixed formats: `lookup_order` returns Unix timestamps, `get_customer` returns ISO 8601 strings, and a legacy billing tool returns numeric status codes. The agent occasionally misinterprets these when reasoning about refund eligibility windows. What is the most reliable fix?", "stem_ja": "MCP tools が混在した形式で日付を返す: `lookup_order` は Unix タイムスタンプ、`get_customer` は ISO 8601、レガシー請求ツールは数値ステータスコード。返金可能期間の推論時にエージェントが時々これらを誤解釈する。最も信頼できる修正は？", "choices": [{"k": "A", "en": "Add a system prompt section documenting each tool's date and status format and instructing the agent to convert them to a canonical form before reasoning about eligibility windows.", "ja": "各ツールの日付・ステータス形式を文書化し、可能期間の推論前に正規形へ変換するよう指示する system prompt セクションを追加"}, {"k": "B", "en": "Ask each backend team to migrate their APIs to a common ISO 8601 date format and a shared status enum, eliminating the inconsistency at the source.", "ja": "各バックエンドチームに共通の ISO 8601 日付形式と共有ステータス enum への API 移行を依頼し、不整合を源で解消"}, {"k": "C", "en": "Add few-shot examples showing the correct interpretation of Unix timestamps, ISO 8601 strings, and the legacy numeric status codes side by side.", "ja": "Unix タイムスタンプ・ISO 8601 文字列・レガシー数値ステータスコードの正しい解釈を並べて示す few-shot 例を追加"}, {"k": "D", "en": "Implement a `PostToolUse` hook that deterministically normalizes all date and status formats into a single canonical representation before the model ever processes the tool results.", "ja": "モデルがツール結果を処理する前に、全日付・ステータス形式を単一の正規表現へ決定論的に正規化する `PostToolUse` hook を実装"}], "correct": "D", "explain_ja": "`PostToolUse` hook はモデルに届く前にデータを決定論的に正規化する——これがこの hook の代表ユースケース。A・C は確率的（誤解釈の余地が残る）。B は自分の制御外で時間もかかる過剰対応。", "refs": "[facts-sheet「ツール結果を加工する hook」]"}, {"id": "S1-Q4", "scenario": "S1", "domain": "D1", "ts": "1.4", "stem_en": "A customer writes: \"My order #1234 arrived damaged, I was double-charged for it, and my loyalty points from last month never showed up.\" How should the agent handle this message?", "stem_ja": "顧客いわく「注文 #1234 が破損して届き、二重請求され、先月のロイヤルティポイントも反映されていない」。エージェントはこのメッセージをどう処理すべきか？", "choices": [{"k": "A", "en": "Process the issues strictly sequentially: fully resolve the damage claim first, then open a fresh investigation for the double-charge, then handle the loyalty points, treating each as an independent ticket.", "ja": "厳密に逐次処理: 破損対応を完了→二重請求の調査を新規開始→ロイヤルティポイント、と各々を独立チケットとして扱う"}, {"k": "B", "en": "Decompose the message into three distinct issues, investigate each in parallel using shared conversation context, then synthesize a single unified resolution.", "ja": "3 つの問題に分解し、共有された会話コンテキストで並列に調査した上で単一の統一された解決策に統合"}, {"k": "C", "en": "Handle the damage claim now since it is most concrete, and ask the customer to submit separate follow-up requests for the billing and loyalty-points issues.", "ja": "最も具体的な破損対応のみ今行い、請求とロイヤルティポイントの件は別途フォローアップリクエストの提出を顧客に依頼"}, {"k": "D", "en": "Escalate the whole message to a human immediately, since a single request bundling three unrelated issues exceeds what a single agent can reliably coordinate.", "ja": "無関係な 3 件を束ねた単一リクエストは単一エージェントが確実に調整できる範囲を超えるため、即時メッセージ全体を人間にエスカレーション"}], "correct": "B", "explain_ja": "公式の multi-concern パターン: 分解 → 共有コンテキストで並列調査 → 統合。A はレイテンシ増と文脈分断、C は顧客に負担転嫁（first-contact resolution 目標にも反する）、D は能力内のタスクの不要なエスカレーション。", "refs": "[matrix S1-D1]"}, {"id": "S1-Q5", "scenario": "S1", "domain": "D1", "ts": "1.4", "stem_en": "The agent has investigated a billing dispute and decided to escalate. The human agents receiving escalations do not have access to the conversation transcript. What should the escalation contain?", "stem_ja": "エージェントが請求紛争を調査しエスカレーションを決めた。エスカレーション先の人間のエージェントは会話トランスクリプトにアクセスできない。エスカレーションには何を含めるべきか？", "choices": [{"k": "A", "en": "The full raw conversation transcript exported as plain text, so the human has every detail and can decide for themselves what matters.", "ja": "生の会話トランスクリプト全文のプレーンテキスト出力。人間が全詳細を持ち、何が重要かを自分で判断できるように"}, {"k": "B", "en": "A short note that the customer is frustrated and needs urgent attention, leaving the human to pull the case details from the backend systems.", "ja": "顧客がフラストレーションを抱えており緊急対応が必要という短い申し送り。ケース詳細はバックエンドから人間が引く前提"}, {"k": "C", "en": "A structured handoff summary containing the customer ID, a root-cause analysis of the dispute, the amounts involved, and a recommended next action.", "ja": "顧客 ID・紛争の根本原因分析・関係金額・推奨される次アクションを含む構造化ハンドオフサマリ"}, {"k": "D", "en": "Only the customer ID and a flag that this is a billing dispute, so the human agent can investigate from scratch without inheriting the agent's bias.", "ja": "エージェントのバイアスを引き継がずゼロから調査できるよう、顧客 ID と「請求紛争」フラグのみ"}], "correct": "C", "explain_ja": "公式の構造化ハンドオフプロトコル。A は受け手が読み切れない（要点抽出を人間に転嫁）、B は実務情報ゼロ、D は調査の重複でエスカレーションの価値を毀損。", "refs": "[matrix S1-D1 / TS 1.4]"}, {"id": "S1-Q6", "scenario": "S1", "domain": "D5", "ts": "5.2", "stem_en": "A customer asks for a refund. `get_customer` returns three accounts matching the provided name, two of which share the same city. What should the agent do?", "stem_ja": "顧客が返金を求めている。`get_customer` が指定された名前にマッチする 3 アカウントを返し、うち 2 つは同じ都市。エージェントはどうすべきか？", "choices": [{"k": "A", "en": "Select the account with the most recent order, since the customer who just placed an order is statistically the one most likely to be contacting support right now.", "ja": "直近の注文があるアカウントを選ぶ（たった今注文した顧客が、統計的に今サポートに連絡している可能性が最も高いため）"}, {"k": "B", "en": "Ask the customer for an additional identifier, such as the email address or an order number tied to the account, before taking any action.", "ja": "何らかのアクションを取る前に、アカウントに紐づくメールアドレスや注文番号など追加の識別子を顧客に尋ねる"}, {"k": "C", "en": "Select the account whose stored details have the highest fuzzy-match score against the name, city, and any phrasing in the conversation so far.", "ja": "名前・都市・これまでの会話の言い回しに対して保存詳細が最も高い fuzzy-match スコアを持つアカウントを選ぶ"}, {"k": "D", "en": "Escalate to a human agent, since disambiguating between multiple identity matches is a judgment call outside the agent's capability.", "ja": "複数の本人マッチの判別は判断を要しエージェントの能力外なので人間にエスカレーション"}], "correct": "B", "explain_ja": "複数マッチはヒューリスティック選択ではなく明確化（追加識別子の要求）が公式パターン。A・C はヒューリスティック選択で誤アカウント操作（誤返金）のリスク——このシナリオで最も避けるべき結果。D は一往復の質問で解決できる事案の過剰エスカレーション。", "refs": "[anti-patterns D5-7]"}, {"id": "S1-Q7", "scenario": "S1", "domain": "D1", "ts": "1.1", "stem_en": "After your agent executes `lookup_order` and receives the result, what must happen for the agent to reason correctly about its next action?", "stem_ja": "エージェントが `lookup_order` を実行して結果を受け取った後、次のアクションを正しく推論するために何が必要か？", "choices": [{"k": "A", "en": "Append the tool result as a `tool_result` block to the conversation history, so it is part of the next API request.", "ja": "ツール結果を `tool_result` ブロックとして会話履歴に追記し、次の API リクエストに含める"}, {"k": "B", "en": "Summarize the result and fold it into the system prompt, rewriting the prompt each turn to keep the running message list short.", "ja": "結果を要約して system prompt に折り込み、進行中のメッセージリストを短く保つため毎ターン prompt を書き換える"}, {"k": "C", "en": "Store the full result in an external database and let the agent query that database again whenever it needs the order details.", "ja": "結果全体を外部データベースに保存し、注文詳細が必要になるたびエージェントにそのデータベースを再照会させる"}, {"k": "D", "en": "Discard the result once the agent has read it in this turn, so that accumulated tool output does not consume context tokens.", "ja": "このターンでエージェントが読んだら結果を破棄し、蓄積したツール出力がコンテキストトークンを消費しないようにする"}], "correct": "A", "explain_ja": "agentic loop の基本: ツール結果は会話履歴（`tool_result` ブロック）として追記され、モデルはそれを踏まえて次を推論する。B は system prompt の誤用（毎ターン書き換えるものではない）、C はモデルから見えなくなる、D は推論の材料を捨てる。", "refs": "[TS 1.1 / facts-sheet「agentic loop」]"}, {"id": "S1-Q8", "scenario": "S1", "domain": "D2", "ts": "2.2", "stem_en": "A customer requests a refund that violates the 30-day return policy. The `process_refund` tool rejects it. What should the tool return to enable the best agent behavior?", "stem_ja": "顧客が 30 日返品ポリシーに違反する返金を要求し、`process_refund` ツールが拒否した。最良のエージェント挙動を可能にするためツールは何を返すべきか？", "choices": [{"k": "A", "en": "`isError: true` with a generic \"Operation failed\" message, keeping the tool interface uniform so the agent's error-handling code stays simple.", "ja": "エージェントのエラー処理コードを単純に保つよう、ツールインターフェース統一のため汎用の \"Operation failed\" と `isError: true`"}, {"k": "B", "en": "A success response with `refund_amount: 0` and a status note, so the agentic workflow continues smoothly without a branch for the failure path.", "ja": "失敗経路の分岐なしに agentic ワークフローが滑らかに続くよう、`refund_amount: 0` とステータス注記付きの成功レスポンス"}, {"k": "C", "en": "`isError: true` with `errorCategory: \"business\"`, `retriable: false`, and a customer-friendly explanation of the specific 30-day policy violation.", "ja": "`isError: true` と `errorCategory: \"business\"`、`retriable: false`、その 30 日ポリシー違反の顧客向け説明"}, {"k": "D", "en": "An exception that terminates the session immediately, since a hard policy violation cannot be resolved by the agent and should not waste further turns.", "ja": "ハードなポリシー違反はエージェントに解決できず以降のターンを浪費すべきでないため、即座にセッションを終了する例外"}], "correct": "C", "explain_ja": "business エラーは「リトライ無意味＋顧客への説明が必要」という性質を構造化して伝える。これでエージェントは無駄なリトライをせず、適切に顧客へ説明できる。A は回復判断の材料ゼロ、B はエラーの黙殺、D は会話で対処可能な事案の過剰終了。", "refs": "[anti-patterns D2-6,7 / matrix S1-D2]"}, {"id": "S1-Q9", "scenario": "S1", "domain": "D5", "ts": "5.1", "stem_en": "Each `lookup_order` call returns 40+ fields (shipping history, warehouse codes, internal flags), but only 5 fields are relevant to returns. After a long multi-issue session, the agent starts losing track of key amounts. What is the most effective context strategy?", "stem_ja": "`lookup_order` は毎回 40 以上のフィールド（配送履歴・倉庫コード・内部フラグ）を返すが、返品に関連するのは 5 フィールドだけ。長い複数問題セッションの後、エージェントが重要な金額を見失い始めた。最も効果的なコンテキスト戦略は？", "choices": [{"k": "A", "en": "Trim each tool output to the 5 relevant fields before it accumulates in context, and keep the transactional facts (amounts, dates, IDs) in a persistent case-facts block.", "ja": "コンテキストに蓄積する前に各ツール出力を関連 5 フィールドにトリミングし、トランザクション上の事実（金額・日付・ID）を永続的な case-facts ブロックに保持"}, {"k": "B", "en": "Switch to a model with a much larger context window so that all 40+ fields from every call fit comfortably and nothing has to be dropped.", "ja": "各呼び出しの 40 以上の全フィールドが余裕で収まり何も捨てずに済むよう、はるかに大きいコンテキストウィンドウのモデルに切替"}, {"k": "C", "en": "Summarize the entire conversation after every single turn to keep the running context compact and below the attention-degradation threshold.", "ja": "進行中のコンテキストをコンパクトに保ち attention 劣化の閾値以下にするため、毎ターン後に会話全体を要約"}, {"k": "D", "en": "Ask the backend team to remove the unused fields from the `lookup_order` API response so the agent only ever receives the 5 relevant ones.", "ja": "エージェントが関連 5 フィールドのみ受け取るよう、バックエンドチームに `lookup_order` API レスポンスからの未使用フィールド削除を依頼"}], "correct": "A", "explain_ja": "公式の二本柱: 冗長なツール出力のトリミング＋重要な事実の構造化永続化。B はコストを上げるだけで attention の問題は残る、C は漸進的要約で数値が曖昧化するアンチパターン、D は制御外への依存（自分の層で解決できる）。", "refs": "[anti-patterns D5-1,3 / matrix S1-D5]"}, {"id": "S1-Q10", "scenario": "S1", "domain": "D5", "ts": "5.2", "stem_en": "A customer's first message is: \"I don't want to talk to a bot. Get me a human. Now.\" The agent's tools could likely resolve what appears to be a simple shipping status question. What should the agent do?", "stem_ja": "顧客の最初のメッセージ:「ボットと話したくない。人間を出して。今すぐ。」エージェントのツールなら、単純な配送状況の質問と思われるこの件をおそらく解決できる。エージェントはどうすべきか？", "choices": [{"k": "A", "en": "Answer the apparent shipping question first using the available tools, then offer to escalate to a human if the customer is still unsatisfied with the result.", "ja": "利用可能なツールでまず配送と思われる質問に答え、それでも結果に不満なら人間へのエスカレーションを申し出る"}, {"k": "B", "en": "Acknowledge the frustration, but explain that the agent can resolve a simple shipping status faster than the human queue and ask to proceed.", "ja": "フラストレーションを受け止めつつ、単純な配送状況なら人間の待ち行列よりエージェントの方が速く解決できると説明し、続行を求める"}, {"k": "C", "en": "Ask one clarifying question about the underlying issue to assess its complexity before deciding whether to handle it or escalate.", "ja": "対応するかエスカレーションするか決める前に、根底の問題について明確化の質問を 1 つして複雑さを評価する"}, {"k": "D", "en": "Escalate to a human agent immediately, honoring the explicit request without first attempting any investigation of the shipping question.", "ja": "配送の質問を一切調査せず、明示的な要求を尊重して即座に人間のエージェントへエスカレーション"}], "correct": "D", "explain_ja": "**明示的な**人間の要求は即座に尊重する——調査を試みてからではない。「受け止めて解決を申し出る」（A・B 系）が正しいのは、顧客がフラストレーションを見せつつも人間を明示要求**していない**場合。C は要求の無視に等しい。区別がこの問題の核心。", "refs": "[anti-patterns D5-6 / TS 5.2]"}, {"id": "S1-Q11", "scenario": "S1", "domain": "D5", "ts": "5.2", "stem_en": "A customer demands a price match against a competitor's listing. Your policy documentation covers price adjustments for your own site's price drops but says nothing about competitor price matching. The agent should:", "stem_ja": "顧客が競合サイトの掲載価格との price match を要求している。ポリシー文書は自サイトの値下げに対する価格調整はカバーしているが、競合との price matching には何も触れていない。エージェントは：", "choices": [{"k": "A", "en": "Decline the request outright, since the policy documentation does not explicitly authorize competitor price matching and silence should be read as a denial.", "ja": "ポリシー文書が競合 price matching を明示的に認めておらず、沈黙は拒否と読むべきなので要求をきっぱり断る"}, {"k": "B", "en": "Apply the own-site price-adjustment policy by analogy to the competitor's listing, since the two situations are economically similar enough to treat alike.", "ja": "2 つの状況は経済的に十分似ており同様に扱えるので、自サイトの価格調整ポリシーを競合の掲載に類推適用する"}, {"k": "C", "en": "Offer a small goodwill credit instead of a price match, sidestepping the unresolved policy question while still satisfying the customer.", "ja": "price match の代わりに少額の好意的クレジットを提案し、未解決のポリシー問題を回避しつつ顧客を満足させる"}, {"k": "D", "en": "Escalate to a human, because the policy is genuinely silent on this specific request and the agent lacks authority to fill the gap.", "ja": "このポリシーは本当にこの特定要求に沈黙しており、エージェントには空白を埋める権限がないため人間にエスカレーション"}], "correct": "D", "explain_ja": "ポリシーの空白（gap）はエージェントの自律判断の範囲外——「複雑だから」ではなく「権限がないから」エスカレーションする。A は「書いてない＝禁止」という勝手な解釈、B・C は権限のない裁量行為（金銭的リスク）。", "refs": "[anti-patterns D5-8 / TS 5.2]"}, {"id": "S1-Q12", "scenario": "S1", "domain": "D1", "ts": "1.1", "stem_en": "Customer requests vary enormously: some need one lookup, others need verification, multiple lookups, and a refund. You are deciding between (a) letting Claude decide which tool to call next based on conversation context, or (b) hardcoding a decision tree that maps request keywords to fixed tool sequences. When is (a) the right choice?", "stem_ja": "顧客リクエストは多様: ルックアップ 1 回で済むもの、検証＋複数ルックアップ＋返金が必要なもの。(a) 会話コンテキストに基づき Claude に次のツールを判断させる、(b) リクエストのキーワードを固定ツールシーケンスにマップする決定木をハードコードする、の選択を検討中。(a) が正しいのはどんなときか？", "choices": [{"k": "A", "en": "Never—production systems must use deterministic, hardcoded tool sequences so that every action is auditable and reproducible under compliance review.", "ja": "決して正しくない——本番システムは監査可能で再現可能なよう、コンプライアンスレビュー下で決定論的・ハードコードされたツールシーケンスを使わねばならない"}, {"k": "B", "en": "When requests are high-ambiguity and the right tool sequence depends on what each step reveals, with well-described tools enabling reliable model-driven selection.", "ja": "リクエストの曖昧性が高く、正しいツール順序が各ステップの判明内容に依存する場合。適切に記述されたツールがモデル駆動選択を信頼可能にする"}, {"k": "C", "en": "Only when fewer than three tools exist, since model-driven selection degrades and becomes unreliable once the agent has more options to choose between.", "ja": "ツールが 3 個未満の場合のみ（選択肢が増えるとモデル駆動選択が劣化し信頼できなくなるため）"}, {"k": "D", "en": "When latency is the top priority, since model-driven selection skips the overhead of a decision tree and is therefore always faster end to end.", "ja": "レイテンシ最優先の場合（モデル駆動選択は決定木のオーバーヘッドを省くため、エンドツーエンドで常に高速だから）"}], "correct": "B", "explain_ja": "モデル駆動の意思決定こそ agentic アーキテクチャの中核で、高曖昧性・適応的なフローに適する。決定木は予測可能な固定フロー向け。A は極端（ガードが必要な箇所だけ hook で強制すればよい）、C の数値根拠はない（4〜5 個が適正という別知識との混同を誘う）、D は無関係な根拠。", "refs": "[TS 1.1 / matrix S1-D1 周辺]"}, {"id": "S2-Q1", "scenario": "S2", "domain": "D3", "ts": "3.1", "stem_en": "A new engineer joined your team and cloned the repository, but Claude Code does not follow your team's coding standards in their sessions, while it works fine for you. You wrote the standards in `~/.claude/CLAUDE.md` last year. What is the root cause and fix?", "stem_ja": "新しいエンジニアがチームに加わりリポジトリを clone したが、彼らのセッションでは Claude Code がチームのコーディング標準に従わない（あなたの環境では機能している）。標準は昨年あなたが `~/.claude/CLAUDE.md` に書いた。根本原因と修正は？", "choices": [{"k": "A", "en": "The standards live in your user-level `~/.claude/CLAUDE.md`, which is local to your machine and never travels with the repository; move them into the project-level CLAUDE.md so they are committed and shared.", "ja": "標準がユーザーレベルの `~/.claude/CLAUDE.md` にあり、これは自分のマシン固有でリポジトリと一緒に移動しない。コミットして共有されるよう、プロジェクトレベルの CLAUDE.md に移す"}, {"k": "B", "en": "The new engineer's Claude Code version is older than the one that first introduced memory-file support; have them upgrade to the latest release and then re-index the freshly cloned repository.", "ja": "新メンバーの Claude Code が、メモリファイル対応を最初に導入したバージョンより古い。最新リリースにアップグレードし、その後 clone したばかりのリポジトリを再インデックスさせる"}, {"k": "C", "en": "The standards file is large enough to exceed the per-session context budget for a fresh checkout; split it into smaller topic files under `~/.claude/rules/` so the engine loads it incrementally.", "ja": "標準ファイルが大きく、新規チェックアウトのセッションあたりコンテキスト予算を超える。エンジンが段階的にロードするよう `~/.claude/rules/` の小さなトピックファイルに分割"}, {"k": "D", "en": "Memory files are inert in a fresh clone until activated, so the new engineer must run `/memory` once to register `~/.claude/CLAUDE.md` for their account.", "ja": "メモリファイルは fresh clone では有効化するまで不活性なので、新メンバーが `/memory` を一度実行して自分のアカウントに `~/.claude/CLAUDE.md` を登録する必要がある"}], "correct": "A", "explain_ja": "`~/.claude/CLAUDE.md` はユーザーレベルで、リポジトリの clone では共有されない。チーム標準はプロジェクトレベル（ルート CLAUDE.md / `.claude/`）に置く。B・C・D は存在しない仕組みやずれた対処（/memory は確認コマンドであり有効化コマンドではない）。", "refs": "[anti-patterns D3-1 / facts-sheet「チーム共有されない階層」]"}, {"id": "S2-Q2", "scenario": "S2", "domain": "D3", "ts": "3.1", "stem_en": "Your root CLAUDE.md has grown to 800 lines mixing testing conventions, API design rules, deployment procedures, and security guidelines. Sessions feel slower and instructions are sometimes ignored. What is the most maintainable restructuring?", "stem_ja": "ルートの CLAUDE.md が 800 行に膨張し、テスト規約・API 設計ルール・デプロイ手順・セキュリティガイドラインが混在している。セッションが遅く感じられ、指示が無視されることもある。最も保守性の高い再構成は？", "choices": [{"k": "A", "en": "Identify the 100 most-cited lines, trim CLAUDE.md down to those, and delete the rest so the file stays small and always fully read.", "ja": "最も参照される 100 行を特定して CLAUDE.md をそこまで削減し残りは削除、ファイルを小さく保ち常に全文を読ませる"}, {"k": "B", "en": "Convert all conventions into individual skills under `.claude/skills/` so each topic loads only when its workflow is explicitly invoked.", "ja": "全規約を `.claude/skills/` 配下の個別 skill に変換し、各トピックはそのワークフローが明示的に起動されたときのみロードさせる"}, {"k": "C", "en": "Split the content into topic-specific files in `.claude/rules/` (e.g., `testing.md`, `api-conventions.md`, `deployment.md`) so each domain is loaded and maintained independently.", "ja": "`.claude/rules/` のトピック特化ファイル（`testing.md`, `api-conventions.md`, `deployment.md` 等）に分割し、各ドメインを独立してロード・保守する"}, {"k": "D", "en": "Relocate each topic into a CLAUDE.md placed in the matching subdirectory (tests/, api/, deploy/) so directory-scoped loading keeps each session lean.", "ja": "各トピックを対応するサブディレクトリ（tests/, api/, deploy/）の CLAUDE.md に移し、ディレクトリスコープのロードで各セッションを軽く保つ"}], "correct": "C", "explain_ja": "モノリシック CLAUDE.md の公式な解は `.claude/rules/` へのトピック分割（または `@import`）。A は情報を捨てる、B は「常時適用すべき標準」をオンデマンド化してしまう（skill と CLAUDE.md の使い分けの誤り）、D はトピックとディレクトリが対応しない場合に破綻。", "refs": "[anti-patterns D3-2 / matrix S2-D3]"}, {"id": "S2-Q3", "scenario": "S2", "domain": "D3", "ts": "3.2", "stem_en": "You built a `/brainstorm` skill that explores alternative implementation approaches. After each use, the main conversation is cluttered with hundreds of lines of exploratory output, degrading subsequent code generation. What is the cleanest fix?", "stem_ja": "代替実装アプローチを探索する `/brainstorm` skill を作ったが、使うたびにメイン会話が数百行の探索的出力で散らかり、後続のコード生成品質が劣化する。最もクリーンな修正は？", "choices": [{"k": "A", "en": "Instruct the skill in SKILL.md to internally summarize its exploration and keep the visible output it returns under 20 lines so the main conversation stays clean and uncluttered.", "ja": "SKILL.md で探索を内部的に要約させ、返す可視出力を 20 行以内に抑えてメイン会話を綺麗で散らからない状態に保つよう指示する"}, {"k": "B", "en": "Run `/compact` immediately after each `/brainstorm` invocation to strip the exploratory output before the next code-generation step.", "ja": "`/brainstorm` 実行の直後に毎回 `/compact` を実行し、次のコード生成ステップ前に探索的出力を除去する"}, {"k": "C", "en": "Move the skill to `~/.claude/skills/` so it runs against your personal configuration and its output is scoped to your context only.", "ja": "skill を `~/.claude/skills/` に移し、個人設定で実行させて出力を自分のコンテキストだけにスコープする"}, {"k": "D", "en": "Add `context: fork` to the skill's frontmatter so the exploration runs in an isolated sub-agent context and only its result returns to the main conversation.", "ja": "skill の frontmatter に `context: fork` を追加し、探索を分離された sub-agent コンテキストで実行して結果だけをメイン会話に戻す"}], "correct": "D", "explain_ja": "`context: fork` はまさに「冗長・探索的な出力をメイン会話から分離する」ための機能。A は探索の質を犠牲にする確率的対処、B は汚染後の事後対応で手動依存、C はスコープ（共有範囲）の話でありコンテキスト分離とは無関係。", "refs": "[facts-sheet「skill の frontmatter キー」/ matrix S2-D5]"}, {"id": "S2-Q4", "scenario": "S2", "domain": "D3", "ts": "3.5", "stem_en": "You ask Claude Code to convert legacy date-handling utilities to a new format. Your prose description of the desired transformation keeps producing inconsistent results across files. What is the most effective way to communicate the requirement?", "stem_ja": "レガシーな日付処理ユーティリティの新形式への変換を Claude Code に依頼している。期待する変換の散文での説明では、ファイルごとに一貫しない結果が出続ける。要件を伝える最も効果的な方法は？", "choices": [{"k": "A", "en": "Rewrite the prose description with stronger, more emphatic wording and explicit \"must always\" constraints so the requirement is harder to misread.", "ja": "より強く断定的な言い回しと明示的な「常に〜すべき」制約で散文説明を書き直し、誤読しにくくする"}, {"k": "B", "en": "Provide 2-3 concrete before/after input-output examples of the transformation so the pattern is unambiguous across files.", "ja": "変換の具体的なビフォー/アフター入出力例を 2〜3 個提供し、ファイル横断でパターンを曖昧さなく示す"}, {"k": "C", "en": "Split the work into one session per file so each conversion gets the model's full attention without cross-file interference.", "ja": "ファイルごとに 1 セッションに分割し、ファイル間の干渉なく各変換にモデルを集中させる"}, {"k": "D", "en": "Switch to plan mode so Claude investigates the utilities and designs the transformation rules itself before applying them.", "ja": "plan mode に切り替えて Claude にユーティリティを調査させ、適用前に変換ルール自体を設計させる"}], "correct": "B", "explain_ja": "散文が一貫せず解釈される場合の公式の第一手は「2〜3 個の具体的な入出力例」。A は同じ手法の強度を上げるだけで曖昧さが残る、C はコストを増やすだけで指示の曖昧さは解決しない、D は設計の問題ではなく要件伝達の問題。", "refs": "[matrix S2-D4 / TS 3.5]"}, {"id": "S2-Q5", "scenario": "S2", "domain": "D3", "ts": "3.5", "stem_en": "Code review found three bugs in Claude-generated code: a race condition in a cache layer, an incorrect lock acquisition order, and a stale-read issue—all three interact with each other in the same concurrency path. How should you feed them back?", "stem_ja": "コードレビューで Claude 生成コードに 3 つのバグが見つかった: キャッシュ層の race condition、誤ったロック取得順序、stale read 問題——3 つとも同じ並行処理パスで相互に作用している。どうフィードバックすべきか？", "choices": [{"k": "A", "en": "Fix them one at a time in strict sequence, verifying each fix in the concurrency path before reporting the next issue.", "ja": "1 つずつ厳密に順に修正し、各修正を並行処理パス上で検証してから次の問題を報告"}, {"k": "B", "en": "Start a fresh session for each bug so contaminated context from one fix cannot bias the reasoning about the others.", "ja": "バグごとに新セッションを開始し、ある修正で汚染されたコンテキストが他の推論に影響しないようにする"}, {"k": "C", "en": "Report only the race condition first, since it is most likely the underlying root cause and fixing it should cascade to automatically resolve the lock-order and stale-read symptoms too.", "ja": "まず race condition だけ報告する（最も可能性の高い根底の根本原因で、それを直せばロック順序と stale read の症状も連鎖的に自動解消するはず）"}, {"k": "D", "en": "Describe all three issues together in a single detailed message so the fix can reason about how the race condition, lock order, and stale read interact.", "ja": "3 つの問題を 1 つの詳細なメッセージでまとめて伝え、race condition・ロック順序・stale read がどう相互作用するかを修正側が推論できるようにする"}], "correct": "D", "explain_ja": "公式パターン: 問題が相互作用する場合は 1 メッセージにまとめ、独立した問題は逐次。逐次修正（A・B）は相互作用するバグでは「1 つ直すと別が壊れる」を繰り返す。C は診断を勝手に確定させる賭け。", "refs": "[TS 3.5 / matrix S2-D4 の周辺知識]"}, {"id": "S2-Q6", "scenario": "S2", "domain": "D5", "ts": "5.4", "stem_en": "Two hours into exploring a large unfamiliar codebase, Claude starts giving inconsistent answers and referring to \"typical repository patterns\" instead of the specific classes it identified earlier. What is the best way to continue the investigation?", "stem_ja": "大規模な未知のコードベースを探索して 2 時間、Claude が一貫しない回答を返し始め、先に特定した具体的なクラスではなく「典型的なリポジトリのパターン」に言及するようになった。調査を続ける最善の方法は？", "choices": [{"k": "A", "en": "Ask Claude to pay closer attention and re-read from disk all of the specific files and individual classes it had carefully analyzed earlier in the same session.", "ja": "もっと注意深く、同じセッションの序盤で丁寧に分析した具体的なファイルと個々のクラスをすべてディスクから読み直すよう Claude に頼む"}, {"k": "B", "en": "Increase `max_tokens` so the model can hold more of the codebase and its earlier findings within each response window.", "ja": "`max_tokens` を増やし、各応答ウィンドウ内により多くのコードベースと過去の発見を保持させる"}, {"k": "C", "en": "Have the agent persist key findings to a scratchpad file on disk and reference that file for subsequent questions instead of relying on in-context memory.", "ja": "キーファインディングをディスク上の scratchpad ファイルに永続化させ、後続の質問ではコンテキスト内記憶に頼らずそのファイルを参照させる"}, {"k": "D", "en": "Restart the session and re-explore the entire codebase from scratch every time the answers start drifting toward generic patterns.", "ja": "回答が汎用的なパターンへ流れ始めるたびにセッションを再起動し、ゼロから全体を再探索する"}], "correct": "C", "explain_ja": "「典型的なパターン」への言及はコンテキスト劣化の典型的兆候。公式対策は scratchpad ファイルによる発見の永続化（＋subagent 委譲・`/compact`）。A は劣化したコンテキストへの精神論、B は出力長の設定でありコンテキスト劣化と無関係、D は毎回全コストを払い直す上に再劣化する。", "refs": "[anti-patterns D5 周辺 / matrix S4-D5 / TS 5.4]"}, {"id": "S2-Q7", "scenario": "S2", "domain": "D3", "ts": "3.2", "stem_en": "Your team occasionally generates release notes following a specific multi-step workflow (collect merged PRs, categorize, draft, format). Where should this workflow live?", "stem_ja": "チームは時々、特定のマルチステップワークフロー（マージ済み PR の収集→分類→草稿→整形）でリリースノートを生成する。このワークフローはどこに置くべきか？", "choices": [{"k": "A", "en": "In the root CLAUDE.md, documented as a numbered procedure so it is always loaded and available in every session.", "ja": "番号付き手順としてルートの CLAUDE.md に文書化し、全セッションで常にロード・利用できるようにする"}, {"k": "B", "en": "As a skill in `.claude/skills/` invoked on demand, since it is an occasional task-specific workflow rather than a universal always-on standard.", "ja": "普遍的な常時適用標準ではなく時々使うタスク特化ワークフローなので、オンデマンド起動の skill として `.claude/skills/`"}, {"k": "C", "en": "In `.claude/rules/` with a glob pattern matching the changelog file, so the workflow steps automatically activate whenever the release notes file is being edited.", "ja": "changelog ファイルにマッチする glob パターン付きで `.claude/rules/` に置き、リリースノートファイルの編集時にワークフロー手順を自動発動させる"}, {"k": "D", "en": "As a deterministic shell script outside Claude Code, since the collect-categorize-draft-format pipeline needs reproducible, scriptable steps.", "ja": "collect→categorize→draft→format パイプラインは再現可能でスクリプト化可能なステップが必要なので、Claude Code 外の決定論的シェルスクリプトとして"}], "correct": "B", "explain_ja": "公式の使い分け: skill = タスク特化ワークフローのオンデマンド起動、CLAUDE.md = 常時ロードの普遍的標準。たまにしか使わない手順を常時ロード（A）するのはトークンの無駄。C はファイル編集時の規約用で手順書ではない。D は判断を要する作業（分類・草稿）を捨てている。", "refs": "[TS 3.2 / facts-sheet「skill の frontmatter」周辺]"}, {"id": "S2-Q8", "scenario": "S2", "domain": "D3", "ts": "3.2", "stem_en": "Developers keep invoking your `/migrate` skill without the required table name, getting confusing failures mid-execution. What is the cleanest fix?", "stem_ja": "開発者が必須のテーブル名なしで `/migrate` skill を起動し続け、実行途中で分かりにくい失敗をしている。最もクリーンな修正は？", "choices": [{"k": "A", "en": "Add `argument-hint` to the skill's frontmatter so the invocation surface prompts developers for the required table-name parameter up front.", "ja": "skill の frontmatter に `argument-hint` を追加し、起動インターフェースで必須のテーブル名パラメータを開発者に前もって促す"}, {"k": "B", "en": "Add a first step in the skill body that validates input and aborts with a clear error message whenever the table-name argument is missing.", "ja": "入力を検証し、テーブル名引数が無いときは明確なエラーメッセージで中断する最初のステップを skill 本文に追加"}, {"k": "C", "en": "Document the required table-name argument in the team wiki and announce the correct invocation syntax in the next standup meeting.", "ja": "必須のテーブル名引数をチーム wiki に文書化し、正しい起動構文を次のスタンドアップで周知"}, {"k": "D", "en": "Rename the skill to `/migrate-tablename` so the name itself signals that a table name must be supplied at invocation.", "ja": "名前自体が起動時にテーブル名を渡すべきと示すよう、skill を `/migrate-tablename` にリネーム"}], "correct": "A", "explain_ja": "`argument-hint` はまさにこの用途——引数なし起動時に必要なパラメータを開発者に促す公式機能。B は動くが失敗してから気づく体験のまま、C は運用でのカバー（読まれない）、D は命名の濫用で引数は依然渡されない。", "refs": "[facts-sheet「skill の frontmatter キー」/ TS 3.2]"}, {"id": "S2-Q9", "scenario": "S2", "domain": "D3", "ts": "3.4", "stem_en": "A user reports a crash with a clear stack trace pointing to a null check missing in one function of one file. Which workflow is appropriate?", "stem_ja": "ユーザーがクラッシュを報告。明確なスタックトレースが 1 ファイルの 1 関数の null チェック欠落を指している。適切なワークフローは？", "choices": [{"k": "A", "en": "Plan mode, to explore the surrounding code paths and design the fix carefully before changing anything in the file.", "ja": "plan mode（変更前に周辺コードパスを探索し修正を慎重に設計）"}, {"k": "B", "en": "Spawn an Explore subagent to map every caller of the function and check for related null-handling gaps before touching it.", "ja": "関数に触る前に全呼び出し元をマッピングし関連する null 処理の漏れを確認する Explore subagent をスポーン"}, {"k": "C", "en": "The interview pattern, having Claude ask questions to surface design considerations and edge cases before implementing the fix.", "ja": "実装前に設計上の考慮事項とエッジケースを引き出す質問を Claude にさせるインタビューパターン"}, {"k": "D", "en": "Direct execution, since this is a well-scoped single-file change with a clear cause already pinpointed by the stack trace.", "ja": "direct execution（スタックトレースで原因が既に特定済みの、スコープが確定した単一ファイル変更のため）"}], "correct": "D", "explain_ja": "明確なスタックトレース付きの単一ファイルバグ修正は direct execution の公式例そのもの。A・B・C は単純なタスクへの過剰プロセス（plan mode の価値は複雑性・複数解・アーキテクチャ判断がある場合）。", "refs": "[anti-patterns D3-5 / matrix S2-D3]"}, {"id": "S2-Q10", "scenario": "S2", "domain": "D3", "ts": "3.5", "stem_en": "You ask Claude Code to add a caching layer to a service in a domain you barely know (cache invalidation requirements, failure modes, consistency needs are all unclear to you). What is the most effective way to start?", "stem_ja": "ほとんど知らないドメインのサービスへのキャッシュ層追加を Claude Code に依頼する（キャッシュ無効化要件・障害モード・整合性要件がすべて自分には不明確）。最も効果的な始め方は？", "choices": [{"k": "A", "en": "Write the most detailed spec you can covering the invalidation, failure, and consistency requirements, then have Claude implement it directly.", "ja": "無効化・障害・整合性の要件を網羅した書ける限り詳細な仕様を書き、Claude に直接実装させる"}, {"k": "B", "en": "Have Claude implement a standard LRU cache first and iterate on the design based on whatever breaks under real traffic.", "ja": "まず標準的な LRU キャッシュを実装させ、実トラフィックで壊れた箇所に基づいて設計を反復する"}, {"k": "C", "en": "Use the interview pattern: have Claude ask you targeted questions to surface invalidation, failure-mode, and consistency considerations you have not anticipated before implementing.", "ja": "インタビューパターンを使う: 実装前に、想定していなかった無効化・障害モード・整合性の考慮事項を浮かび上がらせる的を絞った質問を Claude にさせる"}, {"k": "D", "en": "Copy the caching approach from another service in the company and adapt it to this service's endpoints and data model.", "ja": "社内の別サービスのキャッシュ手法をコピーし、このサービスのエンドポイントとデータモデルに適応させる"}], "correct": "C", "explain_ja": "公式のインタビューパターンの典型例（キャッシュ無効化戦略・障害モードは例として明記されている）。不慣れなドメインでは「自分が知らないことを知らない」ので、A の詳細仕様は穴だらけになる。B は本番で壊して学ぶ運任せ、D は要件が同じである保証がない。", "refs": "[TS 3.5 / matrix S4-D4]"}, {"id": "S2-Q11", "scenario": "S2", "domain": "D3", "ts": "3.4", "stem_en": "You need to migrate from `moment.js` to `date-fns` across 45+ files. Multiple migration strategies exist with different tradeoffs. How should you structure the work?", "stem_ja": "45 ファイル以上にわたる `moment.js` から `date-fns` への移行が必要。トレードオフの異なる複数の移行戦略が存在する。作業をどう構成すべきか？", "choices": [{"k": "A", "en": "Use plan mode to investigate usage patterns and choose a migration strategy, then switch to direct execution to apply the planned approach across the files.", "ja": "plan mode で使用パターンを調査し移行戦略を選択、その後 direct execution に切り替えて計画されたアプローチを各ファイルに適用"}, {"k": "B", "en": "Stay in plan mode for the entire task, including every individual file modification, so that each and every change is explicitly reviewed and approved before it is applied.", "ja": "各ファイルの個別修正も含めタスク全体で plan mode に留まり、あらゆる変更を適用前に明示的にレビュー・承認させる"}, {"k": "C", "en": "Use direct execution throughout from the first file, fixing any strategy inconsistencies as they surface across the codebase.", "ja": "最初のファイルから全体を direct execution で進め、戦略の不整合はコードベース全体に現れるたびに修正"}, {"k": "D", "en": "Split the migration across 45 separate sessions, one per file, to keep each session's context small and focused on a single conversion.", "ja": "各セッションのコンテキストを小さく単一変換に集中させるため、45 の個別セッションに分割（1 ファイル 1 セッション）"}], "correct": "A", "explain_ja": "公式パターン: 調査・設計は plan mode、確定後の実装は direct execution の組み合わせ（ライブラリ移行はガイドの例そのもの）。B は実行フェーズに不要なオーバーヘッド、C は 45 ファイルに広がってから戦略ミスに気づくリスク、D は戦略の一貫性を失う。", "refs": "[TS 3.4 / matrix S2-D3]"}, {"id": "S2-Q12", "scenario": "S2", "domain": "D3", "ts": "3.1", "stem_en": "Claude Code applies your testing conventions in some sessions but not others on the same machine. You suspect a configuration loading issue. What is the right diagnostic first step?", "stem_ja": "同じマシン上で、Claude Code がテスト規約を適用するセッションとしないセッションがある。設定ロードの問題を疑っている。正しい診断の第一歩は？", "choices": [{"k": "A", "en": "Rewrite the testing conventions in stronger, more imperative language so they are harder for any session to ignore or deprioritize.", "ja": "どのセッションでも無視・後回しにされにくいよう、テスト規約をより強く命令的な言葉で書き直す"}, {"k": "B", "en": "Run `/memory` to verify exactly which memory files are actually loaded in the misbehaving sessions versus the working ones.", "ja": "`/memory` を実行し、問題のセッションと正常なセッションで実際にどのメモリファイルがロードされているか正確に確認する"}, {"k": "C", "en": "Delete and recreate all CLAUDE.md files from scratch to clear any silent corruption that might be causing inconsistent loading.", "ja": "不整合なロードを起こしうる静かな破損を消すため、全 CLAUDE.md をゼロから削除・再作成する"}, {"k": "D", "en": "Reinstall Claude Code to reset its configuration cache and force a clean re-discovery of all memory files on next launch.", "ja": "設定キャッシュをリセットし次回起動時に全メモリファイルをクリーンに再検出させるため、Claude Code を再インストールする"}], "correct": "B", "explain_ja": "`/memory` は「どのメモリファイルがロードされているかの確認」と「セッション間の一貫しない挙動の診断」のための公式コマンド。A は原因不明のまま文面をいじる、C・D は診断なしの破壊的対処。まず観測、それから修正。", "refs": "[TS 3.1 / facts-sheet「セッション関連コマンド」]"}, {"id": "S3-Q1", "scenario": "S3", "domain": "D1", "ts": "1.3", "stem_en": "Your synthesis subagent produces reports that ignore the web search findings entirely. Logs show the coordinator invokes the synthesis subagent with the prompt \"Synthesize the research findings into a report.\" What is the root cause?", "stem_ja": "synthesis subagent が Web 検索の発見を完全に無視したレポートを生成する。ログによると coordinator は「リサーチの発見をレポートに統合せよ」というプロンプトで synthesis subagent を起動している。根本原因は？", "choices": [{"k": "A", "en": "Subagents run in isolated contexts and do not inherit the coordinator's conversation history; the search findings must be passed directly inside the synthesis agent's prompt.", "ja": "subagent は分離コンテキストで動作し coordinator の会話履歴を継承しない。検索の発見を synthesis agent のプロンプトに直接渡す必要がある"}, {"k": "B", "en": "The synthesis agent's `max_tokens` is set too low to process the accumulated findings, so it silently drops the search results from its working set.", "ja": "synthesis agent の `max_tokens` が低すぎて蓄積された発見を処理できず、検索結果を作業セットから黙って落としている"}, {"k": "C", "en": "The web search agent persisted its findings in a separate session that the synthesis agent has no way to fork or otherwise read from.", "ja": "Web 検索 agent が別セッションに発見を永続化しており、synthesis agent はそれを fork も読み取りもできない"}, {"k": "D", "en": "The synthesis agent is missing the web search tools in its `allowedTools`, so it has no way to reach the findings the search agent produced earlier in the run.", "ja": "synthesis agent の `allowedTools` に Web 検索ツールが無いため、実行の前段で検索 agent が生成した発見に到達する手段がない"}], "correct": "A", "explain_ja": "subagent は分離されたコンテキストで動作し、親の履歴を自動継承しない——「Synthesize the research findings」と言われても、その findings がプロンプトに無ければ存在しないのと同じ。B は出力設定の話、C は存在しない仕組みの混同、D はツールアクセスとコンテキスト受け渡しの混同（しかも専門外ツール付与のアンチパターン）。", "refs": "[anti-patterns D1-5 / facts-sheet「subagent のコンテキスト」]"}, {"id": "S3-Q2", "scenario": "S3", "domain": "D1", "ts": "1.3", "stem_en": "Research tasks take 6 minutes on average. Tracing shows the coordinator invokes the web search agent, waits for completion, then invokes the document analysis agent, whose work does not depend on the search results. How do you reduce latency?", "stem_ja": "リサーチタスクに平均 6 分かかる。トレースによると coordinator は Web 検索 agent を起動して完了を待ち、その後に検索結果へ依存しない作業を行うドキュメント分析 agent を起動している。レイテンシをどう削減するか？", "choices": [{"k": "A", "en": "Switch both subagents to a faster, lower-latency model so each agent finishes its turn sooner, shrinking the overall 6-minute critical path of the run.", "ja": "両 subagent を高速・低レイテンシのモデルに切り替え、各 agent のターンを早く終わらせて実行全体 6 分のクリティカルパスを縮める"}, {"k": "B", "en": "Have the coordinator emit both Task tool calls within a single response so the two independent subagents run in parallel instead of sequentially.", "ja": "coordinator が 1 レスポンス内で両方の Task tool 呼び出しを発行し、独立した 2 つの subagent を直列でなく並列実行させる"}, {"k": "C", "en": "Merge the two subagents into one agent that holds both tool sets, eliminating the handoff and the round-trip between them entirely.", "ja": "ハンドオフと往復を完全になくすため、2 つの subagent を両ツールセット持ちの 1 agent に統合する"}, {"k": "D", "en": "Submit both subagent invocations through the Message Batches API so they are processed together as a single batched workload.", "ja": "両 subagent の起動を Message Batches API 経由で提出し、単一のバッチ処理としてまとめて処理させる"}], "correct": "B", "explain_ja": "依存関係のない subagent は「1 レスポンス内で複数の Task 呼び出し」で並列化するのが公式パターン。A は根本（直列実行）を直さない、C はツール過多・専門性希釈のアンチパターン方向、D は batch API の用途違い（リアルタイムワークフローに不適、そもそも subagent 起動の仕組みではない）。", "refs": "[anti-patterns D1-8 / facts-sheet「並列 subagent の起動方法」]"}, {"id": "S3-Q3", "scenario": "S3", "domain": "D1", "ts": "1.2", "stem_en": "Your reports often have thorough coverage of some subtopics but completely miss others. You want the system to detect and fix coverage gaps before delivering reports. Which design accomplishes this?", "stem_ja": "レポートは一部のサブトピックを徹底的にカバーする一方、他を完全に見落とすことが多い。レポート提出前にカバレッジギャップを検出・修正させたい。どの設計がこれを達成するか？", "choices": [{"k": "A", "en": "Spawn twice as many search subagents up front to maximize initial coverage, on the assumption that running more searches in parallel will simply leave fewer of the subtopics unaddressed.", "ja": "並列検索を増やせば未対応のサブトピックが減るという前提で、初期カバレッジ最大化のため最初から 2 倍の検索 subagent をスポーンする"}, {"k": "B", "en": "Instruct the synthesis agent to notice coverage gaps itself and fill them in from its own background knowledge before the report is delivered.", "ja": "synthesis agent に、レポート提出前にカバレッジギャップを自分で気づき自身の背景知識で埋めるよう指示する"}, {"k": "C", "en": "Add an iterative refinement loop: the coordinator evaluates the synthesis output for gaps, re-delegates targeted queries to search agents, and re-invokes synthesis until coverage is sufficient.", "ja": "反復改善ループを追加: coordinator が synthesis 出力のギャップを評価し、的を絞ったクエリを検索 agent に再委譲し、カバレッジが十分になるまで synthesis を再起動する"}, {"k": "D", "en": "Lower the report's coverage requirements so that partial coverage counts as acceptable, removing the gap-detection problem at the specification level.", "ja": "部分的カバレッジを許容と数えるようレポートのカバレッジ要件を下げ、ギャップ検出問題を仕様レベルで消す"}], "correct": "C", "explain_ja": "公式の反復改善ループそのもの（評価→再委譲→再統合）。A は物量で賭けるだけでギャップ検出の仕組みがない、B は出典のないハルシネーションを「出典付きレポート」に混入させる最悪手、D は問題の再定義であり解決ではない。", "refs": "[matrix S3-D1 / TS 1.2]"}, {"id": "S3-Q4", "scenario": "S3", "domain": "D2", "ts": "2.1", "stem_en": "Your system has `analyze_content` (\"Analyzes content for insights\") and `analyze_document` (\"Analyzes documents for insights\"). The coordinator routes web pages to `analyze_document` and PDFs to `analyze_content` seemingly at random. What is the most effective fix?", "stem_ja": "システムに `analyze_content`（「コンテンツを分析し洞察を得る」）と `analyze_document`（「ドキュメントを分析し洞察を得る」）がある。coordinator は Web ページを `analyze_document` に、PDF を `analyze_content` に、ほぼランダムにルーティングする。最も効果的な修正は？", "choices": [{"k": "A", "en": "Add few-shot examples to the coordinator's system prompt showing the correct routing for around 10 representative input types so the model can pattern-match.", "ja": "モデルがパターンマッチできるよう、約 10 種類の代表的入力タイプの正しいルーティングを示す few-shot 例を coordinator の system prompt に追加"}, {"k": "B", "en": "Merge both tools into a single `analyze_anything` tool that detects the input type internally and dispatches to the right analysis path on its own, hiding the distinction from the coordinator entirely.", "ja": "入力タイプを内部判定し正しい分析パスへ自前でディスパッチする 1 つの `analyze_anything` ツールに統合"}, {"k": "C", "en": "Add a keyword-based pre-router that inspects the request and deterministically selects the tool before the model ever sees the input.", "ja": "リクエストを検査し、モデルが入力を見る前に決定論的にツールを選ぶキーワードベースの事前ルーターを追加"}, {"k": "D", "en": "Rename the tools to reflect their actual purposes (e.g., `extract_web_results`, `analyze_pdf_document`) and rewrite each description with its inputs, outputs, and when to use it versus the other.", "ja": "実際の目的を反映する名前にリネームし（例: `extract_web_results`, `analyze_pdf_document`）、入力・出力・他方との使い分けを description に書き直す"}], "correct": "D", "explain_ja": "ほぼ同一の名前・description が誤ルーティングの根本原因。リネーム＋目的特化 description が公式の対処。A はトークン増で根本を直さない、B は責務の曖昧化（汎用ツール化のアンチパターン）、C は LLM の自然言語理解を迂回する過剰設計。", "refs": "[anti-patterns D2-2 / 公式 Q2 と同系統]"}, {"id": "S3-Q5", "scenario": "S3", "domain": "D5", "ts": "5.6", "stem_en": "Two credible sources report different figures for the same statistic: a 2023 industry report says 34%, a peer-reviewed paper says 41%. The synthesis agent must produce the final report. How should this conflict be handled?", "stem_ja": "信頼できる 2 つのソースが同じ統計に異なる数値を報告している: 2023 年の業界レポートは 34%、査読付き論文は 41%。synthesis agent が最終レポートを生成しなければならない。この矛盾はどう扱うべきか？", "choices": [{"k": "A", "en": "Present both figures with explicit source attribution and annotate the conflict, letting readers see the disagreement and judge it for themselves.", "ja": "両方の数値をソース帰属付きで提示し、矛盾を注釈して読者が不一致を見て自分で判断できるようにする"}, {"k": "B", "en": "Use the peer-reviewed figure rather than the industry one, since academic sources are generally more rigorous and should outrank industry reports.", "ja": "学術ソースは一般に厳密で業界レポートに勝るべきなので、業界の数値でなく査読付きの数値を使う"}, {"k": "C", "en": "Average the two values into a single combined figure and cite both sources together as the basis for that number.", "ja": "2 値を平均して 1 つの合成値にし、その数値の根拠として両ソースをまとめて引用する"}, {"k": "D", "en": "Use the more recent figure and omit the older one, so the report presents one clean number and does not confuse its readers.", "ja": "新しい方の数値を使い古い方は省き、レポートが 1 つのきれいな数値を提示して読者を混乱させないようにする"}], "correct": "A", "explain_ja": "公式パターン: 信頼できるソース間の矛盾は恣意的に選ばず、ソース帰属付きで併記・注釈する。B・D はもっともらしいヒューリスティックによる恣意的選択、C は存在しない数値の捏造（どちらのソースもその値を主張していない）。", "refs": "[anti-patterns D5-11 / matrix S3-D5 周辺]"}, {"id": "S3-Q6", "scenario": "S3", "domain": "D5", "ts": "5.6", "stem_en": "Your reports keep flagging \"contradictions\" that turn out to be measurements taken in different years (e.g., market size in 2021 vs 2024). What structural change prevents this misinterpretation?", "stem_ja": "レポートが「矛盾」としてフラグした事項が、実は異なる年の測定値（例: 2021 年と 2024 年の市場規模）だったというケースが続いている。この誤解釈を防ぐ構造的変更は？", "choices": [{"k": "A", "en": "Instruct the synthesis agent to ignore any numeric conflict smaller than 20%, treating small gaps as noise rather than real disagreements.", "ja": "小さな差を実際の不一致でなくノイズとみなし、20% 未満の数値の不一致は無視するよう synthesis agent に指示する"}, {"k": "B", "en": "Require subagents to include the publication or data-collection date in their structured outputs, so synthesis can interpret temporal differences correctly instead of flagging them as contradictions.", "ja": "subagent の構造化出力に公開日またはデータ収集日を必須とし、synthesis が時間差を矛盾とフラグせず正しく解釈できるようにする"}, {"k": "C", "en": "Restrict research to sources published within the same calendar year, so every figure the synthesis agent compares shares a common timeframe.", "ja": "リサーチを同一暦年に公開されたソースに限定し、synthesis agent が比較する全数値が共通の時間枠を持つようにする"}, {"k": "D", "en": "Have the synthesis agent quote longer source excerpts around each figure so that readers can infer the relevant timeframes for themselves from the surrounding context in the text.", "ja": "各数値の周囲のより長い抜粋を synthesis agent に引用させ、読者が周辺テキストから自分で時期を推測できるようにする"}], "correct": "B", "explain_ja": "公式パターン: 時間データには公開日・収集日を構造化出力に必須化し、時間差が矛盾と誤解釈されるのを防ぐ。A は実矛盾の見逃しを生む恣意的閾値、C は情報源を不当に狭める、D は解釈の責任を読者に転嫁。", "refs": "[anti-patterns D5-12 / TS 5.6]"}, {"id": "S3-Q7", "scenario": "S3", "domain": "D1", "ts": "1.2", "stem_en": "A teammate proposes letting subagents message each other directly (search agent → analysis agent → synthesis agent) to cut coordinator overhead. What is the strongest argument against this?", "stem_ja": "チームメイトが、coordinator のオーバーヘッド削減のため subagent 同士の直接メッセージング（検索 → 分析 → synthesis）を提案している。これに対する最も強い反論は？", "choices": [{"k": "A", "en": "Direct subagent-to-subagent messaging is not technically possible in any agent architecture, so the proposal cannot be implemented at all.", "ja": "subagent 間の直接メッセージングはどのエージェントアーキテクチャでも技術的に不可能で、そもそも実装できない"}, {"k": "B", "en": "Direct messaging would roughly double token costs, because each message handed between subagents has to be processed twice along the chain.", "ja": "subagent 間で受け渡される各メッセージがチェーン上で 2 回処理されるため、直接メッセージングはトークンコストをほぼ倍にする"}, {"k": "C", "en": "Routing all communication through the coordinator preserves observability, consistent error handling, and controlled information flow across the whole system.", "ja": "全通信を coordinator 経由にすることで、システム全体で可観測性・一貫したエラーハンドリング・制御された情報フローが保たれる"}, {"k": "D", "en": "Subagents talking to each other directly would violate their `allowedTools` restrictions, since messaging another agent is not in any subagent's permitted tool set.", "ja": "他 agent へのメッセージングはどの subagent の許可ツールセットにも無いため、subagent の直接通信は `allowedTools` の制限に違反する"}], "correct": "C", "explain_ja": "hub-and-spoke で coordinator が全通信を仲介する理由は公式に明記: 可観測性・一貫したエラー処理・情報フローの制御。A は「不可能だから」という誤った根拠（設計判断の問題）、B・D は事実として不正確な理由付け。", "refs": "[TS 1.2 / matrix S3-D1 周辺]"}, {"id": "S3-Q8", "scenario": "S3", "domain": "D2", "ts": "2.3", "stem_en": "Your document analysis agent has a generic `fetch_url` tool. Logs show it occasionally fetching arbitrary web pages instead of the research documents it was assigned. What is the most effective constraint?", "stem_ja": "ドキュメント分析エージェントが汎用の `fetch_url` ツールを持っている。ログによると、割り当てられたリサーチドキュメントではなく任意の Web ページを時々取得している。最も効果的な制約は？", "choices": [{"k": "A", "en": "Add a system prompt rule stating \"Only fetch URLs that appear on the assigned document list,\" and rely on the agent to follow that instruction.", "ja": "「割り当てドキュメントリストにある URL のみ取得せよ」という system prompt ルールを追加し、エージェントがその指示に従うことに依存する"}, {"k": "B", "en": "Log every fetch the agent performs and review the logs weekly to catch and follow up on any policy violations after the fact.", "ja": "エージェントの全取得をログに記録し、ログを週次レビューして事後にポリシー違反を捕捉・追跡する"}, {"k": "C", "en": "Reduce the agent's temperature so it behaves more conservatively and is less likely to wander off to arbitrary web pages.", "ja": "より保守的に振る舞い任意の Web ページへ逸脱しにくくなるよう、エージェントの temperature を下げる"}, {"k": "D", "en": "Replace `fetch_url` with a `load_document` tool that validates each requested URL against the assigned document set and refuses anything outside it.", "ja": "`fetch_url` を、要求された各 URL を割り当てドキュメントセットに対して検証しそれ以外を拒否する `load_document` ツールに置き換える"}], "correct": "D", "explain_ja": "公式パターン: 汎用ツールを制約付きの代替（検証付き `load_document`）に置き換える——ツール層での構造的制約は決定論的。A は確率的遵守、B は事後検出で防止にならない、C は無関係なパラメータ。", "refs": "[anti-patterns D2-5 / matrix S3-D2 周辺]"}, {"id": "S3-Q9", "scenario": "S3", "domain": "D1", "ts": "1.3", "stem_en": "The coordinator passes search results to the analysis agent as one long concatenated text blob. Downstream, citations in the final report frequently point to the wrong sources. What change fixes the root cause?", "stem_ja": "coordinator は検索結果を 1 つの長い連結テキストとして分析エージェントに渡している。下流で、最終レポートの引用が頻繁に誤ったソースを指す。根本原因を直す変更は？", "choices": [{"k": "A", "en": "Use structured data formats that keep content paired with its metadata (source URL, document name, page number) whenever context is passed between agents.", "ja": "エージェント間でコンテキストを渡すたびに、コンテンツをそのメタデータ（ソース URL・ドキュメント名・ページ番号）と対にして保つ構造化データ形式を使う"}, {"k": "B", "en": "Instruct the synthesis agent to double-check every citation against the source text before it finalizes the report and signs off on attribution.", "ja": "レポート確定・帰属の承認前に、全引用をソーステキストと突き合わせてダブルチェックするよう synthesis エージェントに指示する"}, {"k": "C", "en": "Append a flat list of all source URLs at the end of the concatenated text blob, so the citations have a reference section to draw from.", "ja": "引用が参照できるセクションを持てるよう、連結テキストの末尾に全ソース URL のフラットなリストを付加する"}, {"k": "D", "en": "Have the report generation agent re-run the original searches to independently verify the source behind each citation it emits.", "ja": "レポート生成エージェントに元の検索を再実行させ、出力する各引用の背後のソースを独立に検証する"}], "correct": "A", "explain_ja": "帰属（attribution）の保持には、claim と source の対応を構造として持つことが必要。連結テキストでは対応関係が melting する——どの主張がどの URL 由来か復元できない。B は壊れた入力のチェックを下流に頼む、C は対応関係がないリストで同じ問題、D はコスト膨大で元の対応は依然不明。", "refs": "[TS 1.3 / anti-patterns D5-10]"}, {"id": "S3-Q10", "scenario": "S3", "domain": "D5", "ts": "5.1", "stem_en": "Your synthesis agent has a limited context budget, but upstream agents return verbose content with full reasoning chains. Findings from the middle of the input often go missing in reports. What is the best structural fix?", "stem_ja": "synthesis エージェントのコンテキスト予算は限られているが、上流エージェントは完全な推論チェーン付きの冗長なコンテンツを返す。入力の中間部の発見がレポートからしばしば欠落する。最良の構造的修正は？", "choices": [{"k": "A", "en": "Truncate each upstream output to its first 2,000 tokens before passing it on, capping how much any single agent can contribute to the budget.", "ja": "各上流出力を先頭 2,000 トークンに切り詰めてから渡し、単一エージェントが予算に寄与できる量を上限で抑える"}, {"k": "B", "en": "Modify upstream agents to return structured data (key facts, citations, relevance scores) instead of verbose content and full reasoning chains.", "ja": "上流エージェントを修正し、冗長なコンテンツと完全な推論チェーンではなく構造化データ（key facts・引用・関連度スコア）を返させる"}, {"k": "C", "en": "Tell the synthesis agent to read the middle sections of its input more carefully so the findings buried there are not overlooked.", "ja": "入力の中間セクションをもっと注意深く読み、そこに埋もれた発見を見落とさないよう synthesis エージェントに指示する"}, {"k": "D", "en": "Drop the oldest findings first whenever the budget is exceeded, on the assumption that newer findings are generally more relevant to the report.", "ja": "新しい発見の方が一般にレポートに関連するという前提で、予算超過時は常に最も古い発見から捨てる"}], "correct": "B", "explain_ja": "公式パターン: 下流の予算が限られるなら、上流の出力形式を構造化データに変える（lost in the middle への構造的対策でもある）。A・D は恣意的な切り捨てで重要情報を失う、C は位置効果への精神論。", "refs": "[anti-patterns D5-2 / TS 5.1]"}, {"id": "S3-Q11", "scenario": "S3", "domain": "D5", "ts": "5.3", "stem_en": "Designing error handling for subagents: which division of responsibility between subagent and coordinator is correct?", "stem_ja": "subagent のエラーハンドリング設計: subagent と coordinator の責務分担として正しいのは？", "choices": [{"k": "A", "en": "Subagents propagate every error immediately to the coordinator, which owns all retry logic and decides how each failure should be handled centrally.", "ja": "subagent は全エラーを即座に coordinator へ伝播し、リトライロジックはすべて coordinator が持って各失敗の扱いを中央で決める"}, {"k": "B", "en": "Subagents handle all errors locally and never report any failure upward, keeping the coordinator simple and free of error-handling branches.", "ja": "subagent は全エラーをローカルで処理し失敗を一切上位へ報告せず、coordinator をシンプルにエラーハンドリング分岐の無い状態に保つ"}, {"k": "C", "en": "Subagents attempt local recovery for transient failures, and propagate only the unresolvable errors along with what was attempted and any partial results.", "ja": "subagent は transient な失敗のローカル回復を試み、解決できないエラーのみを試行内容・部分結果と共に伝播する"}, {"k": "D", "en": "The coordinator polls each subagent for its current error state after every step, gathering status centrally rather than having subagents report it.", "ja": "coordinator が各ステップ後に各 subagent の現在のエラー状態をポーリングし、subagent に報告させる代わりに中央でステータスを収集する"}], "correct": "C", "explain_ja": "公式の責務分担: ローカルで直せるもの（transient）はローカルで、直せないものだけを文脈付きで上げる。A は coordinator が雑音で溢れる、B はエラーの黙殺（回復不能）、D はアーキテクチャとして不自然（subagent は呼び出し応答モデル）。", "refs": "[anti-patterns D2-7 / TS 5.3]"}, {"id": "S3-Q12", "scenario": "S3", "domain": "D5", "ts": "5.6", "stem_en": "Your final reports convert everything—financial data, news summaries, technical findings—into uniform narrative prose for stylistic consistency. Stakeholders complain the reports are hard to use. What does the exam guide recommend?", "stem_ja": "最終レポートは文体の一貫性のため、財務データ・ニュース要約・技術的発見のすべてを一様な散文に変換している。ステークホルダーからレポートが使いにくいと苦情。試験ガイドの推奨は？", "choices": [{"k": "A", "en": "Convert everything to tables instead of prose, since structured tabular data is consistently clearer and easier for stakeholders to scan.", "ja": "構造化された表データの方が一貫して明瞭でステークホルダーが走査しやすいので、散文でなくすべてを表に変換する"}, {"k": "B", "en": "Output the entire report as JSON so downstream tools and viewers can render each part however they want for their own audience.", "ja": "下流ツールやビューアが各部分を自分の読者向けに自由にレンダリングできるよう、レポート全体を JSON で出力する"}, {"k": "C", "en": "Keep the uniform narrative prose but add a table of contents up front so stakeholders can at least navigate to the section they need.", "ja": "一様な散文は維持しつつ、せめて必要なセクションへ移動できるよう冒頭に目次を追加する"}, {"k": "D", "en": "Render each content type in the format that fits it: financial data as tables, news summaries as prose, technical findings as structured lists.", "ja": "コンテンツ種別ごとに適した形式でレンダリングする: 財務データは表、ニュース要約は散文、技術的発見は構造化リスト"}], "correct": "D", "explain_ja": "公式の明記: コンテンツ種別に応じた形式（財務=表、ニュース=散文、技術=構造化リスト）でレンダリングし、一様な形式への変換を避ける。A は「一様化」の方向を変えただけ、B は人間の読者を捨てている、C は形式の問題を残したまま。", "refs": "[anti-patterns D5-13 / TS 5.6]"}, {"id": "S4-Q1", "scenario": "S4", "domain": "D2", "ts": "2.5", "stem_en": "An engineer asks the agent to find every caller of the `calculate_discount` function across a 2,000-file repository. Which built-in tool should the agent reach for first?", "stem_ja": "エンジニアが 2,000 ファイルのリポジトリで `calculate_discount` 関数の全呼び出し元を見つけるようエージェントに依頼した。エージェントが最初に使うべき組み込みツールは？", "choices": [{"k": "A", "en": "Grep, to search file contents for `calculate_discount` references across every file.", "ja": "Grep（全ファイルのファイル内容から `calculate_discount` への参照を検索）"}, {"k": "B", "en": "Glob, to match the paths of all files whose names happen to contain \"discount\".", "ja": "Glob（名前にたまたま \"discount\" を含む全ファイルのパスをマッチ）"}, {"k": "C", "en": "Read, to load each of the 2,000 modules in turn and trace the imports by hand.", "ja": "Read（2,000 モジュールを順にロードして import を手動トレース）"}, {"k": "D", "en": "Bash, to run `ls -R` and reason about callers from the directory structure alone.", "ja": "Bash（`ls -R` でディレクトリ構造を確認し、そこから呼び出し元を推測）"}], "correct": "A", "explain_ja": "「内容（関数名・エラーメッセージ・import 文）を探す」のは Grep の役割。Glob（B）はファイル**パス**のパターンマッチ用——呼び出し元はファイル名からは分からない。C は全読みのアンチパターン、D は内容検索にならない。", "refs": "[facts-sheet「組み込みツールの選択基準」/ anti-patterns D2 周辺]"}, {"id": "S4-Q2", "scenario": "S4", "domain": "D2", "ts": "2.5", "stem_en": "The agent attempts an Edit on a config file but fails: the anchor text appears in 4 places in the file. The agent retries the same Edit twice with the same error. What is the correct fallback?", "stem_ja": "エージェントが設定ファイルに Edit を試みたが失敗: アンカーテキストがファイル内の 4 箇所に出現する。エージェントは同じ Edit を同じエラーで 2 回リトライした。正しいフォールバックは？", "choices": [{"k": "A", "en": "Run a Bash `sed` command to replace all 4 occurrences of the anchor in one pass.", "ja": "Bash の `sed` でアンカーの 4 箇所を一括置換する"}, {"k": "B", "en": "Delete the 3 duplicate sections first so the remaining anchor becomes unique, then Edit.", "ja": "重複する 3 セクションを先に削除して残るアンカーを一意にしてから Edit する"}, {"k": "C", "en": "Use Read to load the full file, then Write the complete corrected content back.", "ja": "Read でファイル全体をロードし、修正済みの完全な内容を Write で書き戻す"}, {"k": "D", "en": "Switch to Glob to locate a different config file where the same anchor is unique.", "ja": "Glob に切り替えて同じアンカーが一意な別の設定ファイルを探す"}], "correct": "C", "explain_ja": "公式パターン: Edit が一意マッチに失敗したら Read + Write がフォールバック。A は意図しない 4 箇所すべての置換（変更したいのは特定の 1 箇所）、B は目的のためにファイルを破壊、D は問題のすり替え。", "refs": "[facts-sheet「Edit 失敗時」/ TS 2.5]"}, {"id": "S4-Q3", "scenario": "S4", "domain": "D2", "ts": "2.3", "stem_en": "Your productivity agent has accumulated 18 tools covering code search, ticket management, deployment, documentation, and calendar integration. Tool selection has become unreliable—the agent often picks a plausible-but-wrong tool. What is the most effective fix?", "stem_ja": "生産性エージェントにコード検索・チケット管理・デプロイ・ドキュメント・カレンダー統合をカバーする 18 個のツールが蓄積された。ツール選択が不安定になり、もっともらしいが間違ったツールを選ぶことが多い。最も効果的な修正は？", "choices": [{"k": "A", "en": "Reorganize the system prompt with a detailed table documenting all 18 tools, their purposes, and when to pick each.", "ja": "18 ツール全部の目的と使い分けを詳細な表で文書化して system prompt を再構成"}, {"k": "B", "en": "Scope the agent down to the 4-5 tools its role actually requires, splitting other capabilities into specialized agents.", "ja": "エージェントの役割が実際に必要とする 4〜5 ツールに絞り、他の機能は特化エージェントに分割"}, {"k": "C", "en": "Rename all 18 tools with a consistent prefix scheme (e.g., `code_`, `ticket_`, `deploy_`) to make selection clearer.", "ja": "選択を明確にするため一貫した接頭辞体系（`code_`, `ticket_`, `deploy_`）で 18 ツール全部をリネーム"}, {"k": "D", "en": "Upgrade to a model with stronger reasoning so it can handle the larger 18-tool decision space reliably.", "ja": "18 ツールの大きな判断空間を確実に扱えるよう推論の強いモデルにアップグレード"}], "correct": "B", "explain_ja": "ツール過多（18 個）は判断の複雑さを増しツール選択を劣化させる——公式の数値例そのもの。適正は役割に必要な 4〜5 個。A・C は 18 個という根本を残したままの微調整、D はコストを増やすだけで判断空間の問題を残す。", "refs": "[anti-patterns D2-3 / facts-sheet「適正ツール数」]"}, {"id": "S4-Q4", "scenario": "S4", "domain": "D2", "ts": "2.4", "stem_en": "You integrated a powerful MCP code-search server with semantic search capabilities, but logs show the agent keeps using the built-in Grep tool instead, producing inferior results for conceptual queries. What is the most likely cause and fix?", "stem_ja": "セマンティック検索対応の強力な MCP コード検索サーバーを統合したが、ログによるとエージェントは組み込みの Grep を使い続け、概念的クエリで劣った結果を出している。最も可能性の高い原因と修正は？", "choices": [{"k": "A", "en": "Built-in tools always take priority over MCP tools in the runtime; remove Grep from `allowedTools` to force the switch.", "ja": "組み込みツールはランタイムで常に MCP tool より優先される。切り替えを強制するため Grep を `allowedTools` から外す"}, {"k": "B", "en": "The MCP tool's description is too thin for the agent to grasp its advantages; enhance it to spell out capabilities and outputs.", "ja": "MCP tool の description が薄く、エージェントが利点を理解できない。能力と出力を詳細に説明するよう強化する"}, {"k": "C", "en": "The MCP server is registered at user level rather than project level; move it into the project-level `.mcp.json` so the agent prefers it.", "ja": "MCP サーバーがユーザーレベル登録になっている。エージェントが優先するようプロジェクトレベルの `.mcp.json` に移す"}, {"k": "D", "en": "Semantic search requires `tool_choice: \"any\"` to be selectable by the agent at all during these queries.", "ja": "これらのクエリでセマンティック検索をエージェントがそもそも選択するには `tool_choice: \"any\"` が必要"}], "correct": "B", "explain_ja": "公式パターン: MCP tool の description を強化し、組み込みツールより高機能であることをエージェントに伝える。A は誤った前提（優先順位の固定ルールはない）＋他のタスクを壊す乱暴な対処、C はスコープと選択行動の混同、D は `tool_choice` の用途違い（構造化出力の保証用）。", "refs": "[anti-patterns D2-10 / matrix S4-D2]"}, {"id": "S4-Q5", "scenario": "S4", "domain": "D2", "ts": "2.4", "stem_en": "Your team wants to share a Jira MCP server configuration so every developer gets it on clone, but the server needs each developer's personal API token, and tokens must not be committed. What is the correct setup?", "stem_ja": "チームで Jira MCP サーバー設定を共有し、clone した全開発者に行き渡らせたい。ただしサーバーには各開発者の個人 API トークンが必要で、トークンはコミット禁止。正しいセットアップは？", "choices": [{"k": "A", "en": "Commit `.mcp.json` with a single shared service-account token so no developer has to manage individual credentials.", "ja": "単一の共有サービスアカウントのトークン入りで `.mcp.json` をコミットし、個人のクレデンシャル管理を不要にする"}, {"k": "B", "en": "Have each developer configure the server in their user-scoped `~/.claude.json` with their own personal token.", "ja": "各開発者が自分の個人トークンでユーザースコープの `~/.claude.json` に設定する"}, {"k": "C", "en": "Document the full server config in CLAUDE.md and let each developer add it to their own config manually with their token.", "ja": "サーバー設定全体を CLAUDE.md に文書化し、各開発者がトークン付きで自分の設定に手動追加する"}, {"k": "D", "en": "Commit `.mcp.json` with the server config using `${JIRA_TOKEN}` environment variable expansion; each developer sets the variable locally.", "ja": "`${JIRA_TOKEN}` の環境変数展開を使ったサーバー設定で `.mcp.json` をコミットし、各開発者がローカルで変数を設定する"}], "correct": "D", "explain_ja": "公式パターンそのもの: プロジェクトスコープ `.mcp.json` ＋環境変数展開で「設定は共有、シークレットはコミットしない」を両立。A はシークレットのコミット（即アウト）、B は設定が共有されない（毎人手動セットアップ）、C は CLAUDE.md の用途違い＋手動コピーの劣化版。", "refs": "[facts-sheet「シークレットの扱い」/ matrix S4-D3 周辺]"}, {"id": "S4-Q6", "scenario": "S4", "domain": "D1", "ts": "1.6", "stem_en": "A team asks the agent to \"add comprehensive tests to this legacy codebase\" — a vague, open-ended task over an unfamiliar 100k-line system. How should the agent decompose the work?", "stem_ja": "チームがエージェントに「このレガシーコードベースに包括的なテストを追加して」と依頼——未知の 10 万行システムに対する曖昧でオープンエンドなタスク。エージェントは作業をどう分解すべきか？", "choices": [{"k": "A", "en": "First map the codebase structure, identify high-impact areas, then create a prioritized plan that adapts as dependencies are discovered.", "ja": "まずコードベース構造をマッピングし、影響の大きい領域を特定し、依存関係の発見に応じて適応する優先順位付き計画を作成"}, {"k": "B", "en": "Generate tests file by file in strict alphabetical order until the stated coverage targets are met across the system.", "ja": "設定されたカバレッジ目標をシステム全体で満たすまで厳密なアルファベット順にファイル単位でテストを生成"}, {"k": "C", "en": "Use a fixed pipeline up front: list every file → generate one test per file → run the suite → report final coverage.", "ja": "最初に固定パイプラインを敷く: 全ファイル列挙 → 各ファイルにテスト 1 つ生成 → スイート実行 → 最終カバレッジ報告"}, {"k": "D", "en": "Ask the team to first provide a complete enumerated list of all functions to test before starting any of the work.", "ja": "作業開始前に、テスト対象の全関数を列挙した完全なリストの提供をまずチームに求める"}], "correct": "A", "explain_ja": "オープンエンドなタスクの公式分解パターン: 構造マッピング → 高インパクト領域の特定 → 適応的な優先順位付き計画。B・C は固定的・機械的分解で「包括的」の意味（重要なものから守る）を取り違えている（固定パイプラインは予測可能なタスク向け）。D は探索で解決できることを依頼者に転嫁。", "refs": "[TS 1.6 / matrix S4-D1 周辺]"}, {"id": "S4-Q7", "scenario": "S4", "domain": "D2", "ts": "2.5", "stem_en": "An engineer wants every test file in the repository, which follows the `*.test.tsx` naming convention but is scattered across dozens of directories. Which tool fits best?", "stem_ja": "エンジニアがリポジトリ内の全テストファイルを求めている。テストファイルは `*.test.tsx` の命名規則に従うが、数十のディレクトリに散在している。最も適したツールは？", "choices": [{"k": "A", "en": "Grep, searching the contents of every file for the literal string \"test\" and collecting the hits.", "ja": "Grep（全ファイルのファイル内容からリテラル文字列 \"test\" を検索してヒットを収集）"}, {"k": "B", "en": "Read on each of the dozens of directories in turn to list its contents and pick out the test files.", "ja": "数十のディレクトリそれぞれへの Read で内容を列挙しテストファイルを選り分ける"}, {"k": "C", "en": "Bash `ls -R` over the whole tree, piped through a custom filter script that keeps `*.test.tsx`.", "ja": "ツリー全体に Bash の `ls -R` をかけ、`*.test.tsx` を残す自作フィルタスクリプトに通す"}, {"k": "D", "en": "Glob with the pattern `**/*.test.tsx` to match those paths across the entire repository.", "ja": "Glob（パターン `**/*.test.tsx`）でリポジトリ全体の該当パスをマッチ"}], "correct": "D", "explain_ja": "ファイル**名のパターン**による発見は Glob の役割（`**/*.test.tsx` は公式の例そのもの）。Grep（A）は内容検索用で、\"test\" を含む無関係なファイルも拾う。B は Read の用途違い（ディレクトリは読めない）、C は Glob があるのに遠回り。", "refs": "[facts-sheet「組み込みツールの選択基準」/ TS 2.5]"}, {"id": "S4-Q8", "scenario": "S4", "domain": "D2", "ts": "2.5", "stem_en": "The agent must understand how authentication works in an unfamiliar 80k-line codebase. Which exploration strategy does the exam guide recommend?", "stem_ja": "エージェントは未知の 8 万行コードベースで認証の仕組みを理解しなければならない。試験ガイドが推奨する探索戦略は？", "choices": [{"k": "A", "en": "Read every file in the `auth/` directory first, then expand outward file by file to adjacent modules until the flow is clear.", "ja": "まず `auth/` ディレクトリの全ファイルを Read し、フローが明確になるまでファイル単位で外側へ拡大"}, {"k": "B", "en": "Load the entire 80k-line codebase into context at session start so that all of the information is available to the agent up front.", "ja": "全情報が最初から利用できるようセッション開始時に 8 万行のコードベース全体をコンテキストにロード"}, {"k": "C", "en": "Start with Grep to find entry points (e.g., login handlers), then use Read to follow imports and trace flows incrementally.", "ja": "Grep でエントリポイント（例: ログインハンドラ）を見つけることから始め、Read で import を辿りフローを漸進的にトレース"}, {"k": "D", "en": "Ask the user to fully explain the authentication architecture before touching any tool at all.", "ja": "ツールに一切触れる前に、認証アーキテクチャの完全な説明をユーザーに求める"}], "correct": "C", "explain_ja": "公式の漸進的理解パターン: Grep でエントリポイント → Read で辿る（全読みしない）。A・B は「まず全部読む」の変種でコンテキストを浪費する（B は物理的にも不可能なことが多い）、D はツールで解決できることの転嫁。", "refs": "[matrix S2-D2 / TS 2.5]"}, {"id": "S4-Q9", "scenario": "S4", "domain": "D2", "ts": "2.4", "stem_en": "Your agent helps engineers with an internal issue tracker via MCP tools (`search_issues`, `get_issue`). Engineers complain the agent makes many exploratory `search_issues` calls just to discover what projects and labels exist. What is the right mechanism to fix this?", "stem_ja": "エージェントは MCP tools（`search_issues`, `get_issue`）で社内 issue トラッカーの利用を支援している。どんなプロジェクトやラベルが存在するかを知るためだけに、エージェントが探索的な `search_issues` 呼び出しを多発するとエンジニアから苦情。これを直す正しいメカニズムは？", "choices": [{"k": "A", "en": "Paste the full project and label list into the system prompt and update it by hand whenever it changes.", "ja": "全プロジェクト・ラベルのリストを system prompt に貼り、変更のたびに手動更新する"}, {"k": "B", "en": "Expose the project/label catalog as MCP resources so the agent has visibility without exploratory tool calls.", "ja": "プロジェクト／ラベルのカタログを MCP resources として公開し、探索的ツール呼び出しなしで可視化する"}, {"k": "C", "en": "Add a `list_everything` tool that dumps all projects, labels, and issues to the agent in one big call.", "ja": "全プロジェクト・ラベル・issue を 1 回の大きな呼び出しでエージェントに出力する `list_everything` ツールを追加"}, {"k": "D", "en": "Cache `search_issues` responses on the server so the repeated exploratory calls at least return faster.", "ja": "`search_issues` のレスポンスをサーバー側でキャッシュし、繰り返しの探索呼び出しを少なくとも高速化"}], "correct": "B", "explain_ja": "MCP resources の公式ユースケース: コンテンツカタログ（issue サマリ・ドキュメント階層・スキーマ等）の公開による探索的ツール呼び出しの削減。A は手動更新で陳腐化、C は巨大出力でコンテキストを汚す雑なツール設計、D は無駄な呼び出し自体を減らさない。", "refs": "[facts-sheet「MCP resources の用途」/ anti-patterns D2 周辺]"}, {"id": "S4-Q10", "scenario": "S4", "domain": "D1", "ts": "1.7", "stem_en": "Yesterday the agent analyzed your payment module in a named session. Overnight, a teammate refactored two of the analyzed files. You want to continue the investigation today. What is the right approach?", "stem_ja": "昨日、エージェントは名前付きセッションで決済モジュールを分析した。夜間にチームメイトが分析済みファイルのうち 2 つをリファクタリングした。今日、調査を継続したい。正しいアプローチは？", "choices": [{"k": "A", "en": "Resume the named session silently; the agent will notice the two changes on its own when it next reads those files.", "ja": "黙って名前付きセッションを再開する。エージェントは次にその 2 ファイルを読むとき自分で変更に気づく"}, {"k": "B", "en": "Always start a fresh session and re-explore the whole payment module, since any resumed session is inherently unreliable.", "ja": "再開セッションは本質的に信頼できないので、常に新セッションで決済モジュール全体を再探索"}, {"k": "C", "en": "Use `fork_session` to create a parallel branch that proceeds from the old analysis and ignores the overnight file changes.", "ja": "`fork_session` で、古い分析から進み夜間のファイル変更を無視する並列ブランチを作成"}, {"k": "D", "en": "Resume the named session and tell the agent which two specific files changed, so it can re-analyze just those.", "ja": "名前付きセッションを再開し、変更された 2 ファイルをエージェントに伝えて、その分だけ再分析させる"}], "correct": "D", "explain_ja": "公式パターン: 過去のコンテキストが大部分有効なら resume ＋変更点の明示で、対象を絞った再分析をさせる。A は古い分析結果（stale な記憶）に基づく誤推論のリスク——エージェントは自発的に再読しない、B は大部分有効な分析を捨てる過剰対応、C は fork の用途違い（発散的アプローチの探索用）。", "refs": "[anti-patterns D1-9 / TS 1.7]"}, {"id": "S4-Q11", "scenario": "S4", "domain": "D1", "ts": "1.7", "stem_en": "After a thorough shared analysis of a legacy module, you want to compare two competing refactoring strategies, each explored independently without contaminating the other. Which mechanism fits?", "stem_ja": "レガシーモジュールの徹底的な共有分析の後、競合する 2 つのリファクタリング戦略を、互いを汚染せず独立に探索して比較したい。適した機構は？", "choices": [{"k": "A", "en": "Two fresh sessions, each repeating the full legacy-module analysis from scratch before exploring its own strategy.", "ja": "新規セッション 2 つで、それぞれレガシーモジュールの完全な分析をゼロから繰り返してから自分の戦略を探索"}, {"k": "B", "en": "One session exploring strategy A first, then run `/compact`, then explore strategy B in the same session.", "ja": "1 セッションでまず戦略 A を探索 → `/compact` を実行 → 同じセッションで戦略 B を探索"}, {"k": "C", "en": "`fork_session` to create independent branches that each start from the shared analysis baseline.", "ja": "`fork_session` で共有の分析ベースラインからそれぞれ始まる独立したブランチを作成"}, {"k": "D", "en": "`--resume` the same analysis session twice in two parallel terminals, one per strategy.", "ja": "同一の分析セッションを並列ターミナルで 2 回 `--resume`（戦略ごとに 1 つ）"}], "correct": "C", "explain_ja": "`fork_session` の公式ユースケースそのもの: 共有ベースラインからの発散的探索（2 つのリファクタリング/テスト戦略の比較は例として明記）。A は分析コストの二重払い、B は A の探索内容が B に混入（汚染）、D は同一セッションの併走で履歴が衝突する。", "refs": "[TS 1.7 / facts-sheet「セッション関連コマンド」]"}, {"id": "S4-Q12", "scenario": "S4", "domain": "D5", "ts": "5.4", "stem_en": "Your multi-agent codebase exploration occasionally crashes mid-run, losing hours of work. You need crash recovery. Which design does the exam guide recommend?", "stem_ja": "マルチエージェントのコードベース探索が実行中に時々クラッシュし、数時間分の作業が失われる。クラッシュリカバリが必要。試験ガイドが推奨する設計は？", "choices": [{"k": "A", "en": "Each agent exports structured state to a known location; on resume, the coordinator loads a manifest and reinjects it into prompts.", "ja": "各エージェントが既知の場所に構造化された状態をエクスポートし、再開時に coordinator がマニフェストをロードしてエージェントのプロンプトに状態を注入する"}, {"k": "B", "en": "Rely entirely on the conversation history, which the runtime is assumed to persist automatically across every crash and restore on its own.", "ja": "クラッシュのたびにランタイムが自動で残し自力で復元すると想定して会話履歴に頼る"}, {"k": "C", "en": "Re-run the entire multi-agent exploration from scratch after each crash, since any recovered partial state is fundamentally unreliable.", "ja": "回復された部分的な状態は本質的に信頼できないので、クラッシュのたびにマルチエージェント探索全体をゼロから再実行"}, {"k": "D", "en": "Print all intermediate findings to the console as they happen so a human operator can manually copy them back in on resume.", "ja": "全中間発見を発生のたびにコンソールに出力し、再開時に人間のオペレータが手動でコピーして戻せるようにする"}], "correct": "A", "explain_ja": "公式のクラッシュリカバリ設計: 構造化された状態エクスポート（マニフェスト）＋再開時のロードと注入。B は「自動で残って都合よく復元される」という誤った前提、C は数時間の作業を毎回捨てる、D は手動運用でスケールしない。", "refs": "[TS 5.4 / matrix S4-D5 周辺]"}, {"id": "S5-Q1", "scenario": "S5", "domain": "D3", "ts": "3.6", "stem_en": "Your CI review bot re-reviews a PR after each new commit. Developers complain that the same findings get posted again and again, even ones they explicitly dismissed. What is the correct fix?", "stem_ja": "CI レビューボットがコミットごとに PR を再レビューする。開発者から、明示的に却下したものも含めて同じ指摘が何度も投稿されると苦情が出ている。正しい修正は？", "choices": [{"k": "A", "en": "Include the prior review findings in the context and instruct Claude to report only new or still-unaddressed issues.", "ja": "過去のレビュー指摘をコンテキストに含め、新規または未対応の問題のみ報告するよう Claude に指示する"}, {"k": "B", "en": "Add a post-processing script that string-matches each new comment against the previous ones and drops the near-duplicates before posting.", "ja": "新コメントを過去のコメントと文字列マッチし、投稿前に近似重複を落とす後処理スクリプトを追加する"}, {"k": "C", "en": "Configure the pipeline to review each PR only once, on its first commit, and skip every subsequent commit entirely.", "ja": "PR の最初のコミット時に 1 回だけレビューし、以降のコミットは完全にスキップするようパイプラインを設定する"}, {"k": "D", "en": "Lower the bot's verbosity threshold so that fewer findings are posted overall on every review pass.", "ja": "ボットの冗長性しきい値を下げ、毎回のレビューで投稿される指摘数を全体的に減らす"}], "correct": "A", "explain_ja": "公式パターン: 再レビュー時は過去の指摘を文脈として渡し「新規・未対応のみ」を指示する。B は言い回しが変わるだけですり抜ける脆い対症療法、C は新コミットの問題を見逃す、D は重複の根本を直さず有用な指摘も減らす。", "refs": "[anti-patterns D3-9 / TS 3.6]"}, {"id": "S5-Q2", "scenario": "S5", "domain": "D3", "ts": "3.6", "stem_en": "Your nightly test-generation job keeps proposing test cases that already exist in the suite, wasting reviewer time. What is the most effective fix?", "stem_ja": "夜間のテスト生成ジョブが、スイートに既に存在するテストケースを提案し続け、レビュアーの時間を浪費している。最も効果的な修正は？", "choices": [{"k": "A", "en": "Instruct the prompt explicitly with \"Do not generate any tests that duplicate existing coverage.\"", "ja": "プロンプトに「既存カバレッジを重複するテストは一切生成するな」と明示的に指示する"}, {"k": "B", "en": "Reduce the number of tests generated per night from 20 down to 5 to limit the volume of duplicates.", "ja": "重複の量を抑えるため夜間の生成テスト数を 20 から 5 に減らす"},
