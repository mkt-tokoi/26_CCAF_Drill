 {"k": "C", "en": "Provide the existing test files in the context so that generation can avoid scenarios that are already covered.", "ja": "既存のテストファイルをコンテキストに提供し、既にカバー済みのシナリオを生成が避けられるようにする"}, {"k": "D", "en": "Post-process the generated tests and drop any whose names happen to match the names of existing tests.", "ja": "生成テストを後処理し、既存テスト名とたまたま一致する名前のものを除外する"}], "correct": "C", "explain_ja": "モデルは「何が既にあるか」を知らなければ重複を避けられない——指示（A）ではなく情報（C）の問題。B は量を減らすだけで重複率は変わらない、D は名前が違う同内容のテストを素通しする。", "refs": "[anti-patterns D3-10 / TS 3.6]"}, {"id": "S5-Q3", "scenario": "S5", "domain": "D4", "ts": "4.1", "stem_en": "30% of your review bot's findings are style nitpicks that developers consider noise, and trust in the bot is eroding—even its accurate security findings get ignored. Which prompt change is most effective?", "stem_ja": "レビューボットの指摘の 30% が、開発者がノイズと見なすスタイルの細かい指摘で、ボットへの信頼が損なわれている——正確なセキュリティ指摘まで無視され始めた。最も効果的なプロンプト変更は？", "choices": [{"k": "A", "en": "Add the instruction \"only report issues that you are highly confident about\" to the system prompt.", "ja": "「高い確信がある問題のみ報告せよ」という指示をシステムプロンプトに追加する"}, {"k": "B", "en": "Define explicit criteria for which categories to report (bugs, security vulnerabilities) and which to skip (minor style, local patterns).", "ja": "報告するカテゴリ（バグ、セキュリティ脆弱性）とスキップするカテゴリ（軽微なスタイル、ローカルパターン）の明示的基準を定義する"}, {"k": "C", "en": "Add the instruction \"be conservative and avoid nitpicking trivial style issues\" to the system prompt.", "ja": "「保守的に、些末なスタイルの細かい指摘を避けよ」という指示をシステムプロンプトに追加する"}, {"k": "D", "en": "Have the bot self-assign a 1-10 confidence score per finding and filter out everything scoring below 7.", "ja": "指摘ごとに 1〜10 の確信度を自己採点させ、7 未満のものをすべてフィルタアウトする"}], "correct": "B", "explain_ja": "公式の知見: 「保守的に」「高確信のみ」のような一般的指示（A・C）は精度を改善しない。カテゴリカルな明示基準が正解。D は較正の悪い自己申告確信度への依存（エスカレーション問題と同型のアンチパターン）。false positive の放置が正確なカテゴリへの信頼まで毀損する、という問題設定も公式の知見そのもの。", "refs": "[anti-patterns D4-1 / matrix S5-D4]"}, {"id": "S5-Q4", "scenario": "S5", "domain": "D4", "ts": "4.1", "stem_en": "Your review bot labels findings with severity (critical/major/minor), but the same kind of issue gets \"critical\" one day and \"minor\" the next. How do you achieve consistent severity classification?", "stem_ja": "レビューボットは指摘に深刻度（critical/major/minor）を付けるが、同種の問題がある日は \"critical\"、翌日は \"minor\" になる。一貫した深刻度分類をどう達成するか？", "choices": [{"k": "A", "en": "Add more severity levels (5 instead of 3) so the classification becomes more finely grained and precise.", "ja": "分類をより細かく精密にするため深刻度レベルを増やす（3 → 5）"}, {"k": "B", "en": "Run the review three times per finding and take the median of the three severity labels assigned.", "ja": "各指摘につきレビューを 3 回実行し、付与された 3 つの深刻度ラベルの中央値を取る"}, {"k": "C", "en": "Instruct the bot to \"think carefully about the severity of each issue before labeling it.\"", "ja": "「各問題の深刻度をラベル付けの前に注意深く考えよ」とボットに指示する"}, {"k": "D", "en": "Define explicit severity criteria with concrete code examples for each severity level.", "ja": "各深刻度レベルに具体的なコード例を伴う明示的な深刻度基準を定義する"}], "correct": "D", "explain_ja": "公式パターン: 深刻度レベルごとに具体的なコード例を付けた明示基準。A は曖昧な境界を増やして逆効果、B はコスト 3 倍で揺れの根本（基準の欠如）を直さない、C は中身のない精神論指示。", "refs": "[anti-patterns D4-3 / TS 4.1]"}, {"id": "S5-Q5", "scenario": "S5", "domain": "D3", "ts": "3.6", "stem_en": "You need the review findings as machine-parseable data (file, line, severity, message) to post them as inline PR comments automatically. Which invocation is correct?", "stem_ja": "レビュー指摘を機械可読データ（ファイル・行・深刻度・メッセージ）として取得し、インライン PR コメントとして自動投稿したい。正しい起動方法は？", "choices": [{"k": "A", "en": "`claude -p \"...\" --output-format json --json-schema review-schema.json`", "ja": "`claude -p \"...\" --output-format json --json-schema review-schema.json`"}, {"k": "B", "en": "`claude -p \"Respond ONLY in valid JSON matching this shape: ...\"` and parse the resulting text output.", "ja": "`claude -p \"この形に一致する有効な JSON のみで応答せよ: ...\"` で得たテキスト出力をパースする"}, {"k": "C", "en": "`claude -p \"...\" --format structured --schema review-schema.json`, relying on the structured-format flag pair.", "ja": "`claude -p \"...\" --format structured --schema review-schema.json` で structured フォーマットのフラグ対に依存する"}, {"k": "D", "en": "`claude -p \"...\"` and extract the JSON block from the markdown response with a regular expression.", "ja": "`claude -p \"...\"` の markdown 応答から正規表現で JSON ブロックを抽出する"}], "correct": "A", "explain_ja": "CI で構造化出力を強制する公式の組み合わせは `--output-format json` ＋ `--json-schema`。B・D はプロンプト頼み・正規表現頼みの確率的アプローチ（構文崩れに弱い）、C は存在しないフラグ（distractor の定番: 実在しない機能）。", "refs": "[facts-sheet「CI での構造化出力フラグ」/ anti-patterns D3-7]"}, {"id": "S5-Q6", "scenario": "S5", "domain": "D4", "ts": "4.6", "stem_en": "Your pipeline has Claude generate a bug fix and then, in the same session, asks \"Review your changes for issues before committing.\" The review consistently approves its own code, including changes that later fail in production. Why, and what is the fix?", "stem_ja": "パイプラインで Claude にバグ修正を生成させ、同じセッションで「コミット前に自分の変更をレビューせよ」と依頼している。レビューは一貫して自分のコードを承認し、後に本番で失敗する変更も含まれる。なぜか、そして修正は？", "choices": [{"k": "A", "en": "The review prompt is too vague; add a detailed checklist of issue categories to the same session's review step so it scrutinizes the diff more rigorously.", "ja": "レビュープロンプトが曖昧。diff をより厳格に精査させるため、同セッションのレビューステップに問題カテゴリの詳細チェックリストを追加する"}, {"k": "B", "en": "The model retains its generation reasoning and is unlikely to question its own decisions; use a second, independent Claude instance without the generator's context for review.", "ja": "モデルは生成時の推論を保持しており自身の判断を疑いにくい。生成側のコンテキストを持たない独立した第 2 の Claude インスタンスにレビューさせる"}, {"k": "C", "en": "The session has run out of usable context; run `/compact` before the review step so the model can re-read the diff with a clean window.", "ja": "セッションの使用可能なコンテキストが枯渇している。クリーンなウィンドウで diff を読み直せるようレビュー前に `/compact` を実行する"}, {"k": "D", "en": "Reviews require extended thinking to catch subtle defects; enable extended thinking for the review step within the same session.", "ja": "微妙な欠陥を捉えるにはレビューに extended thinking が必要。同セッションのレビューステップで extended thinking を有効化する"}], "correct": "B", "explain_ja": "self-review の限界は公式の知見: 生成時の推論コンテキストが残っていると自分の判断を疑えない。独立インスタンス（推論コンテキストなし）が、self-review 指示や extended thinking（D）より有効と明記されている。A はセッション同一という根本を残す、C は無関係な仕組み。", "refs": "[anti-patterns D3-8 / TS 4.6 / matrix S5-D5]"}, {"id": "S5-Q7", "scenario": "S5", "domain": "D4", "ts": "4.2", "stem_en": "Your review bot's findings are formatted inconsistently: some include file/line/severity/fix, others are vague paragraphs. You already wrote detailed formatting instructions, with little improvement. What is the most effective next step?", "stem_ja": "レビューボットの指摘のフォーマットが一貫しない: ファイル/行/深刻度/修正案を含むものもあれば、曖昧な段落のものもある。詳細なフォーマット指示は既に書いたが改善は小さい。最も効果的な次の一手は？", "choices": [{"k": "A", "en": "Rewrite the existing formatting instructions as a numbered list with stricter, more imperative wording.", "ja": "既存のフォーマット指示を、より厳しく命令的な言い回しの番号付きリストに書き直す"}, {"k": "B", "en": "Lower the sampling temperature so that the outputs become more deterministic and uniform.", "ja": "出力がより決定的で均一になるようサンプリング temperature を下げる"}, {"k": "C", "en": "Include few-shot examples demonstrating the exact desired output format (location, issue, severity, suggested fix).", "ja": "望ましい出力形式（場所・問題・深刻度・修正案）を正確に実演する few-shot 例を含める"}, {"k": "D", "en": "Post-process the outputs with a formatter script that restructures the vague paragraphs into the target shape.", "ja": "曖昧な段落を目標の形に再構成するフォーマッタスクリプトで出力を後処理する"}], "correct": "C", "explain_ja": "公式の知見: 詳細な指示だけで一貫しない場合、few-shot 例が一貫したフォーマットを達成する最も効果的なテクニック。A は既に失敗したアプローチの強化版、B はフォーマット構造の問題に効かない、D は曖昧な段落から構造を捏造できない。", "refs": "[TS 4.2 / matrix S5-D4 周辺]"}, {"id": "S5-Q8", "scenario": "S5", "domain": "D4", "ts": "4.4", "stem_en": "Developers dismiss about 25% of your bot's findings, but you have no systematic way to learn which kinds of code constructs trigger false positives. What should you add?", "stem_ja": "開発者がボットの指摘の約 25% を却下しているが、どの種類のコード構造が false positive を引き起こすかを体系的に学ぶ手段がない。何を追加すべきか？", "choices": [{"k": "A", "en": "A free-text comment box that asks developers to explain every single dismissal in detail at the time they dismiss it.", "ja": "却下のたびに、その全却下の詳細説明を開発者に求める自由記述コメント欄"}, {"k": "B", "en": "A weekly meeting where the team discusses the dismissed findings from memory and tries to spot common themes.", "ja": "チームが却下された指摘を記憶ベースで議論し共通テーマを探そうとする週次ミーティング"}, {"k": "C", "en": "Automatic suppression of any finding type that gets dismissed by developers two or more times in a row.", "ja": "開発者に 2 回以上連続で却下された指摘タイプの自動抑制"}, {"k": "D", "en": "A `detected_pattern` field in each structured finding, enabling analysis of which patterns correlate with dismissals.", "ja": "各構造化指摘に `detected_pattern` フィールドを追加し、どのパターンが却下と相関するかの分析を可能にする"}], "correct": "D", "explain_ja": "公式のフィードバックループ設計: `detected_pattern` フィールドで「何に反応して指摘したか」を構造化記録し、却下パターンの体系的分析を可能にする。A は開発者の負担で続かない、B はデータなしの印象論、C は 2 回という閾値で本物のバグ検出を雑に消す。", "refs": "[TS 4.4 / anti-patterns D4 周辺]"}, {"id": "S5-Q9", "scenario": "S5", "domain": "D3", "ts": "3.6", "stem_en": "Your CI test generation produces low-value tests: wrong fixtures, ignored team conventions, and assertions on trivialities. The pipeline invokes `claude -p` with a generic \"generate tests for the changed files\" prompt. What is the most maintainable fix?", "stem_ja": "CI のテスト生成が低価値なテストを生む: 誤ったフィクスチャ、無視されたチーム規約、些末事へのアサーション。パイプラインは汎用的な「変更ファイルのテストを生成せよ」プロンプトで `claude -p` を起動している。最も保守性の高い修正は？", "choices": [{"k": "A", "en": "Document testing standards, valuable-test criteria, and available fixtures in CLAUDE.md so every CI invocation gets the project context.", "ja": "テスト標準・価値あるテストの基準・利用可能なフィクスチャを CLAUDE.md に文書化し、全 CI 起動がプロジェクトコンテキストを得るようにする"}, {"k": "B", "en": "Expand the inline pipeline prompt by pasting the full testing guide directly into the YAML workflow definition.", "ja": "テストガイド全文を YAML ワークフロー定義に直接貼り込んでインラインのパイプラインプロンプトを拡張する"}, {"k": "C", "en": "Have a senior engineer manually rewrite or correct the generated tests after each nightly run completes.", "ja": "毎回の夜間実行が完了するたびにシニアエンジニアが生成テストを手動で書き直すか修正する"}, {"k": "D", "en": "Restrict generation to a single test per changed file in order to limit the damage from low-value output.", "ja": "低価値な出力の被害を限定するため生成を変更ファイルあたり 1 テストに制限する"}], "correct": "A", "explain_ja": "CLAUDE.md は CI から起動される Claude Code にプロジェクトコンテキストを与える公式機構（テスト標準・フィクスチャ規約は明記された例）。B は動くが YAML が肥大しエディタ作業と二重管理になる、C は自動化の意味を失う、D は品質ではなく量の制限。", "refs": "[TS 3.6 / matrix S5-D3]"}, {"id": "S5-Q10", "scenario": "S5", "domain": "D4", "ts": "4.1", "stem_en": "Your bot's security findings are 95% accurate, but its \"code smell\" category runs at 60% false positives. Developers have started ignoring everything, including security alerts. What is the immediate action?", "stem_ja": "ボットのセキュリティ指摘は 95% 正確だが、「code smell」カテゴリは false positive 率 60%。開発者はセキュリティ警告も含めすべてを無視し始めた。直ちに取るべき行動は？", "choices": [{"k": "A", "en": "Keep all categories enabled but add a disclaimer noting that code-smell findings may be unreliable and should be verified.", "ja": "全カテゴリを有効に保ちつつ、code smell 指摘は信頼できない可能性があり要検証だという免責文を追加する"}, {"k": "B", "en": "Retrain developers to evaluate each finding on its own merits regardless of which category it falls into.", "ja": "どのカテゴリに属するかによらず各指摘をそれ自体の実質で評価するよう開発者を再教育する"}, {"k": "C", "en": "Reduce the overall finding volume by reporting only the top 3 highest-priority issues per PR.", "ja": "PR あたり最優先の上位 3 件のみ報告して全体の指摘量を削減する"}, {"k": "D", "en": "Temporarily disable the code-smell category to restore trust, while improving its prompt criteria before re-enabling it.", "ja": "信頼回復のため code smell カテゴリを一時的に無効化し、プロンプト基準を改善してから再有効化する"}], "correct": "D", "explain_ja": "公式パターン: false positive の多いカテゴリの一時無効化で信頼を回復し、裏でそのカテゴリのプロンプトを改善する。高 FP カテゴリの放置は正確なカテゴリへの信頼まで毀損する（まさに問題文の状況）。A は無視の正当化、B は問題をユーザーに転嫁、C は正確なセキュリティ指摘も間引くリスク。", "refs": "[anti-patterns D4-2 / TS 4.1]"}, {"id": "S5-Q11", "scenario": "S5", "domain": "D4", "ts": "4.5", "stem_en": "Documents arrive continuously and must be analyzed within a 30-hour SLA. You want the Message Batches API for its 50% cost savings, knowing batches can take up to 24 hours. Which submission strategy guarantees the SLA?", "stem_ja": "ドキュメントが継続的に到着し、30 時間 SLA 内に分析しなければならない。バッチは最大 24 時間かかると知った上で、50% のコスト削減のため Message Batches API を使いたい。SLA を保証する提出戦略は？", "choices": [{"k": "A", "en": "Submit one batch per day at midnight, so each document waits at most one daily cycle before being processed.", "ja": "毎日深夜に 1 バッチ提出し、各ドキュメントは処理前に最大でも 1 日サイクル待つだけにする"}, {"k": "B", "en": "Submit batches every 4 hours, so worst-case wait (4h queue + 24h processing) stays within 30 hours.", "ja": "4 時間ごとにバッチ提出（最悪ケースの待ち = キュー 4h + 処理 24h = 30 時間以内に収まる）"}, {"k": "C", "en": "Submit batches every 12 hours and accept the occasional SLA miss as an acceptable cost trade-off.", "ja": "12 時間ごとに提出し、時折の SLA 違反を許容可能なコストのトレードオフとして受け入れる"}, {"k": "D", "en": "Use the synchronous API for every document, since batches can never reliably meet any time-bound SLA.", "ja": "バッチは時間制約のある SLA を確実には満たせないので全ドキュメントを同期 API で処理する"}], "correct": "B", "explain_ja": "公式の計算例そのもの: 24 時間処理＋提出間隔で最悪ケースを見積もる（4 時間ウィンドウで 30 時間 SLA を保証）。A は最悪 24+24=48 時間で違反、C は 12+24=36 時間で違反を設計に組み込んでいる、D は SLA に余裕があるのにコスト削減を放棄する極端。", "refs": "[facts-sheet「Message Batches API」/ TS 4.5]"}, {"id": "S5-Q12", "scenario": "S5", "domain": "D4", "ts": "4.2", "stem_en": "The bot flags legitimate intentional patterns (e.g., intentional fallthrough in switch statements with comments) as bugs. You want fewer false positives without missing real issues of the same shape. What is the most effective technique?", "stem_ja": "ボットが正当で意図的なパターン（例: コメント付きの意図的な switch fallthrough）をバグとしてフラグする。同じ形の本物の問題は見逃さずに false positive を減らしたい。最も効果的なテクニックは？", "choices": [{"k": "A", "en": "Add the explicit rule \"do not flag switch fallthrough as a bug\" to the review prompt.", "ja": "「switch fallthrough をバグとしてフラグするな」という明示ルールをレビュープロンプトに追加する"}, {"k": "B", "en": "Exclude all switch statements from the review scope so the false positives can no longer occur.", "ja": "false positive が起こらなくなるよう全 switch 文をレビュー範囲から除外する"}, {"k": "C", "en": "Provide few-shot examples distinguishing acceptable code patterns from genuine issues, so the model generalizes the judgment.", "ja": "許容可能なコードパターンと真の問題を区別する few-shot 例を提供し、モデルに判断を一般化させる"}, {"k": "D", "en": "Require two consecutive review runs to agree on a finding before any fallthrough issue is posted.", "ja": "fallthrough の問題は 2 回連続のレビュー実行が指摘で一致した場合のみ投稿する"}], "correct": "C", "explain_ja": "few-shot の公式ユースケース: 許容パターン vs 真の問題の区別を例で示し、**事前指定ケースのマッチングではなく判断の一般化**を可能にする。A は意図的でない（バグの）fallthrough まで見逃す全面禁止、B はさらに広い盲点を作る、D は断続的にしか検出されない実バグを抑制する合意要求。", "refs": "[TS 4.2 / anti-patterns D4-11]"}, {"id": "S6-Q1", "scenario": "S6", "domain": "D4", "ts": "4.3", "stem_en": "Your invoice extractor outputs a `tax_id` for every document, but 20% of source invoices contain no tax ID at all—the model is fabricating plausible-looking values. The schema currently marks `tax_id` as required. What is the correct fix?", "stem_ja": "請求書抽出器が全ドキュメントに `tax_id` を出力するが、ソース請求書の 20% には税 ID が存在せず、モデルがもっともらしい値を捏造している。スキーマは現在 `tax_id` を required にしている。正しい修正は？", "choices": [{"k": "A", "en": "Add a strongly worded prompt instruction—\"Never invent values that are not present in the document; leave them empty\"—and reinforce it with a few-shot example of an invoice that has no tax ID.", "ja": "「ドキュメントに存在しない値を決して発明せず空のままにせよ」という強い言い回しのプロンプト指示を追加し、税 ID の無い請求書の few-shot 例で補強する"}, {"k": "B", "en": "Make `tax_id` nullable/optional in the schema so the model can return null when the information is absent.", "ja": "スキーマで `tax_id` を nullable / optional にし、情報が無い場合にモデルが null を返せるようにする"}, {"k": "C", "en": "Keep the field required but add a post-extraction validator that checks every returned tax ID against an external government registry and rejects unverifiable values.", "ja": "フィールドは required のまま、返ってきた全税 ID を外部の政府レジストリと照合し検証できない値を拒否するバリデータを追加"}, {"k": "D", "en": "Keep the field required and instruct the model to output the sentinel string \"N/A\" whenever the value is genuinely missing from the source.", "ja": "フィールドは required のまま、値がソースに本当に無い場合はセンチネル文字列 \"N/A\" を出力するよう指示する"}], "correct": "B", "explain_ja": "required フィールドはスキーマを満たすための捏造を**構造的に**誘発する。公式の対処は optional / nullable 設計。A は構造的圧力をプロンプトと few-shot で抑えようとする確率的対処、C は捏造の検出を後段に追加するだけ（防止ではない＋外部依存）、D は null の役割を果たす魔法文字列で下流の型処理を壊す。", "refs": "[anti-patterns D4-4 / facts-sheet「捏造防止のスキーマ設計」]"}, {"id": "S6-Q2", "scenario": "S6", "domain": "D4", "ts": "4.3", "stem_en": "Your pipeline has three extraction tools (`extract_invoice`, `extract_receipt`, `extract_contract`) and processes documents of unknown type. You need a guarantee that every API response is structured tool output—never conversational text. Which configuration is correct?", "stem_ja": "パイプラインに 3 つの抽出ツール（`extract_invoice`, `extract_receipt`, `extract_contract`）があり、種別不明のドキュメントを処理する。すべての API レスポンスが構造化されたツール出力であり、会話テキストが決して返らない保証が必要。正しい設定は？", "choices": [{"k": "A", "en": "`tool_choice: \"auto\"`, since the model will naturally prefer one of the three tools whenever they fit the document.", "ja": "`tool_choice: \"auto\"`（3 つのツールのいずれかが合えばモデルは自然にそれを選ぶ）"}, {"k": "B", "en": "`tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` to force a single, deterministic extraction path for every document.", "ja": "`tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` で全ドキュメントに単一の決定論的な抽出パスを強制"}, {"k": "C", "en": "Omit `tool_choice` entirely and instead add a strict, explicit system prompt rule stating that every response must be a tool call and must never be conversational prose.", "ja": "`tool_choice` を一切指定せず、応答は常にツール呼び出しで散文を返してはならないという厳格な system prompt ルールを追加"}, {"k": "D", "en": "`tool_choice: \"any\"`, so the model is required to call one of the tools but is free to choose whichever matches the document type.", "ja": "`tool_choice: \"any\"`（モデルは必ずいずれかのツールを呼ばねばならないが、ドキュメント種別に合うものを自由に選べる）"}], "correct": "D", "explain_ja": "要件は 2 つ: 「必ずツール出力」＋「種別はモデルが選ぶ」。`\"any\"` がその組み合わせ。A（auto）はテキスト返答の余地を残す、B は全ドキュメントを invoice として処理してしまう、C はプロンプトによる確率的保証で「保証」にならない。", "refs": "[facts-sheet「tool_choice の 3 オプション」/ TS 4.3]"}, {"id": "S6-Q3", "scenario": "S6", "domain": "D4", "ts": "4.4", "stem_en": "With strict JSON schemas via tool use, you no longer see syntax errors—but some extractions have line items that don't sum to the stated total. Validation catches these. What should the retry request contain?", "stem_ja": "tool use による厳密な JSON スキーマで構文エラーは無くなったが、明細の合計が記載された総額と一致しない抽出がある。バリデーションがこれを検出する。リトライリクエストには何を含めるべきか？", "choices": [{"k": "A", "en": "The same prompt and the same document, retried up to three times with temperature set to 0 for determinism.", "ja": "同じプロンプトと同じドキュメントを、決定論性のため temperature 0 で最大 3 回リトライ"}, {"k": "B", "en": "A stricter JSON schema that adds numeric range and cross-field sum constraints on the total field so the mismatch cannot pass validation.", "ja": "total フィールドに数値範囲制約とフィールド間の合計制約を加え、不一致がバリデーションを通過できないようにしたより厳しい JSON スキーマ"}, {"k": "C", "en": "The original document, the failed extraction, and the specific validation error describing the sum mismatch.", "ja": "元ドキュメント、失敗した抽出結果、合計不一致を説明する具体的なバリデーションエラー"}, {"k": "D", "en": "Just the failed extraction by itself with the instruction \"fix the numeric errors in this output and return corrected JSON.\"", "ja": "失敗した抽出結果だけを単独で渡し「この出力の数値エラーを修正し訂正済み JSON を返せ」と指示"}], "correct": "C", "explain_ja": "公式の retry-with-error-feedback: 元ドキュメント＋失敗した抽出＋具体的なバリデーションエラーの 3 点セットで自己修正させる。A は同じ入力で同じ間違いを繰り返す盲目リトライ、B はスキーマでは**意味**エラー（合計の不一致）を防げない、D は照合先のドキュメントが無く何が間違いかも伝えていない。", "refs": "[anti-patterns D4 周辺 / facts-sheet「意味エラー」/ TS 4.4]"}, {"id": "S6-Q4", "scenario": "S6", "domain": "D4", "ts": "4.4", "stem_en": "A contract extraction repeatedly fails validation: the `counterparty_address` field comes back null. Investigation shows the address exists only in a separate appendix document that is not part of the input. The pipeline currently retries each failed extraction five times. What should change?", "stem_ja": "ある契約書の抽出がバリデーションに失敗し続けている: `counterparty_address` フィールドが null で返る。調査の結果、住所は入力に含まれない別紙ドキュメントにのみ存在する。パイプラインは現在、失敗した抽出を 5 回リトライしている。何を変えるべきか？", "choices": [{"k": "A", "en": "Increase the retry count from five to ten specifically for contracts, on the assumption that this document type is simply harder to extract and just needs more attempts to succeed.", "ja": "契約書はそもそも抽出が難しく試行回数が必要だという前提で、このドキュメント種別のリトライを 10 回に増やす"}, {"k": "B", "en": "Add few-shot examples that demonstrate correct counterparty-address extraction drawn from other, successfully processed contracts.", "ja": "正常に処理できた他の契約書から取った正しい counterparty address 抽出の few-shot 例を追加"}, {"k": "C", "en": "Rewrite the prompt with more forceful, explicit instructions directing the model to locate and return the counterparty address.", "ja": "counterparty address を見つけて返すようモデルに指示する、より強く明示的な言い回しにプロンプトを書き換える"}, {"k": "D", "en": "Recognize this as a non-retryable case—the information is absent from the source—and handle it as missing data (e.g., flag that the appendix must be supplied) instead of retrying.", "ja": "これをリトライ不能なケース——情報がソースに不在——と認識し、リトライではなく欠損データとして処理する（例: 別紙の提供が必要とフラグする）"}], "correct": "D", "explain_ja": "公式の知見: リトライが有効なのはフォーマット・構造起因の失敗のみで、**情報がソースに存在しない**場合は何回リトライしても無効。欠損として処理し別紙の提供を要求するのが正しい（むしろ null は正しい挙動——捏造しなかった証拠）。A・B・C はすべて「存在しない情報」をモデルの努力で解決しようとしている。", "refs": "[anti-patterns D4-6 / TS 4.4]"}, {"id": "S6-Q5", "scenario": "S6", "domain": "D4", "ts": "4.5", "stem_en": "Your nightly batch of 5,000 documents returns 200 failures: 150 exceeded the context limit, 50 hit transient errors. The batch results include `custom_id` for each request. What is the correct failure-handling strategy?", "stem_ja": "夜間バッチの 5,000 ドキュメントが 200 件の失敗を返した: 150 件はコンテキスト上限超過、50 件は transient エラー。バッチ結果には各リクエストの `custom_id` が含まれる。正しい失敗処理戦略は？", "choices": [{"k": "A", "en": "Resubmit the entire 5,000-document batch using a model with a larger context window so the oversized documents fit.", "ja": "過大なドキュメントが収まるよう、より大きいコンテキストウィンドウのモデルで 5,000 件のバッチ全体を再提出"}, {"k": "B", "en": "Switch all 200 failed documents to the synchronous API to guarantee they get processed this time.", "ja": "200 件の失敗ドキュメント全てを同期 API に切り替え、今度こそ確実に処理されるようにする"}, {"k": "C", "en": "Resubmit only the failed documents, identified by `custom_id`: chunk the 150 oversized ones to fit the context limit, and retry the 50 transient failures as-is.", "ja": "`custom_id` で特定した失敗ドキュメントのみ再提出: 150 件の過大なものはコンテキスト上限に収まるようチャンク化し、50 件の transient 失敗はそのままリトライ"}, {"k": "D", "en": "Log all 200 failures to a tracking system and process them manually by hand, since the Message Batches API does not support retrying individual failed requests after a batch completes.", "ja": "200 件の失敗をログに記録し手動処理する（Message Batches API は個別の失敗リクエストの再提出に非対応のため）"}], "correct": "C", "explain_ja": "公式パターン: `custom_id` で失敗分のみを特定し、失敗原因に応じた修正（チャンク化）を加えて再提出。A は成功済み 4,800 件分のコストを捨てる、B はバッチの意義（コスト 50% 減）を失う一方で「保証」にもならない（失敗種別への対処がない）、D は誤った前提（再提出は可能）。", "refs": "[anti-patterns D4-8 / facts-sheet「Message Batches API」]"}, {"id": "S6-Q6", "scenario": "S6", "domain": "D5", "ts": "5.5", "stem_en": "Your extraction system reports 97% overall accuracy, and management wants to eliminate human review for high-confidence extractions. What must you verify before agreeing?", "stem_ja": "抽出システムは全体精度 97% を報告しており、経営層は高確信度の抽出について人間によるレビューを廃止したがっている。同意する前に何を検証しなければならないか？", "choices": [{"k": "A", "en": "Accuracy broken down by document type and field segment, plus stratified random sampling of high-confidence extractions to measure their actual error rate.", "ja": "ドキュメント種別・フィールドセグメント別に分解した精度と、高確信度抽出の実エラー率を測る層化ランダムサンプリング"}, {"k": "B", "en": "That the aggregate 97% accuracy figure stays above the 95% bar for at least three consecutive weekly evaluation runs before any change to the review process is approved.", "ja": "変更を承認する前に、集計 97% 精度が 3 週連続の週次評価で 95% の基準を上回り続けていること"}, {"k": "C", "en": "That the model's own self-reported confidence scores average above 0.9 across the entire corpus, indicating it rarely doubts its extractions.", "ja": "モデル自身の自己申告確信度スコアがコーパス全体で平均 0.9 を超え、抽出をめったに疑っていないと示すこと"}, {"k": "D", "en": "That the validation set contains at least 10,000 documents so the 97% aggregate figure clears the threshold for statistical significance.", "ja": "97% という集計値が統計的有意性の閾値を超えるよう、検証セットが少なくとも 1 万ドキュメントを含むこと"}], "correct": "A", "explain_ja": "公式の知見: 集計精度（97%）は特定のドキュメント種別・フィールドの低性能を隠し得る。自動化拡大の前に (1) セグメント別精度分析と (2) 高確信度抽出の層化サンプリングによる実エラー率測定が必須。B・D は同じ集計値の信頼性を上げるだけでセグメントの劣化は見えない、C は較正されていない自己申告確信度への依存。", "refs": "[anti-patterns D5-9 / matrix S6-D5]"}, {"id": "S6-Q7", "scenario": "S6", "domain": "D4", "ts": "4.3", "stem_en": "Your pipeline must always run `extract_metadata` first (the enrichment tools depend on its output), then proceed with enrichment in later steps. How do you guarantee the metadata extraction happens first?", "stem_ja": "パイプラインは必ず最初に `extract_metadata` を実行しなければならない（enrichment ツールがその出力に依存）。その後のステップで enrichment を進める。メタデータ抽出が最初に走ることをどう保証するか？", "choices": [{"k": "A", "en": "`tool_choice: \"any\"` together with a clear prompt instruction telling the model to start with metadata extraction before any enrichment.", "ja": "`tool_choice: \"any\"` ＋、enrichment の前にメタデータ抽出から始めよという明確なプロンプト指示を併用"}, {"k": "B", "en": "`tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}` on the first request, then process the dependent enrichment steps in follow-up turns.", "ja": "最初のリクエストで `tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}` を指定し、依存する enrichment ステップはフォローアップターンで処理"}, {"k": "C", "en": "List `extract_metadata` first in the tools array, relying on array order to signal that it has priority over the enrichment tools.", "ja": "tools 配列の先頭に `extract_metadata` を置き、配列順が enrichment ツールより優先であることを示すと当て込む"}, {"k": "D", "en": "`tool_choice: \"auto\"` and validate afterwards that metadata extraction ran first, retrying the whole sequence if it did not.", "ja": "`tool_choice: \"auto\"` で実行後に検証し、メタデータ抽出が最初でなければシーケンス全体をリトライ"}], "correct": "B", "explain_ja": "特定ツールを確実に最初に呼ばせるのは強制ツール選択の公式ユースケース（`extract_metadata` → enrichment はガイドの例そのもの）。A は「どれかのツール」の保証であり「このツール」の保証ではない、C は存在しない仕様（配列順に優先度の意味はない）、D は確率的実行＋事後修正で無駄が出る。", "refs": "[facts-sheet「tool_choice」/ TS 4.3]"}, {"id": "S6-Q8", "scenario": "S6", "domain": "D4", "ts": "4.2", "stem_en": "Documents with unusual structures (inline citations instead of bibliographies, narrative descriptions instead of tables) frequently yield empty or null values for fields that are actually present in the text. What is the most effective fix?", "stem_ja": "構造が変わったドキュメント（参考文献リストではなくインライン引用、表ではなく叙述的説明）で、テキスト中に実際は存在するフィールドが空や null になることが頻発する。最も効果的な修正は？", "choices": [{"k": "A", "en": "Make the affected fields required in the schema so the model is structurally forced to find and return them.", "ja": "該当フィールドをスキーマで required にし、モデルに構造的に発見と返却を強制する"}, {"k": "B", "en": "Lengthen the field descriptions in the schema with more synonyms and alternate phrasings so the model recognizes the data in varied wording.", "ja": "スキーマのフィールド説明を同義語や言い換えで長くし、多様な言い回しのデータをモデルが認識できるようにする"}, {"k": "C", "en": "Add few-shot examples demonstrating correct extraction from documents with varied structures (inline citations, narrative descriptions, and so on).", "ja": "インライン引用や叙述的説明など多様な構造のドキュメントからの正しい抽出を実演する few-shot 例を追加する"}, {"k": "D", "en": "Pre-process every document into a single uniform template before extraction so the model always sees one consistent structure.", "ja": "抽出前に全ドキュメントを単一の一様なテンプレートに前処理し、モデルが常に一貫した構造を見るようにする"}], "correct": "C", "explain_ja": "公式の知見: 構造の多様性（インライン引用 vs 参考文献等）への対処は、多様な形式からの正しい抽出を示す few-shot 例が最も有効。A は存在しない場合の捏造を誘発する（方向が逆）、B は構造の問題に語彙で対処、D は前処理自体が同じ抽出問題を抱える。", "refs": "[TS 4.2 / anti-patterns D4 周辺]"}, {"id": "S6-Q9", "scenario": "S6", "domain": "D4", "ts": "4.3", "stem_en": "Your `document_category` enum has 12 values, but new document types appear weekly and the model crams them into the closest existing category, corrupting downstream routing. What is the right schema design?", "stem_ja": "`document_category` の enum には 12 値あるが、新しいドキュメント種別が毎週現れ、モデルは最も近い既存カテゴリに押し込み、下流のルーティングを壊している。正しいスキーマ設計は？", "choices": [{"k": "A", "en": "Remove the enum entirely and make `document_category` a free-text field so any category the model invents is possible.", "ja": "enum を完全に外して `document_category` を自由記述フィールドにし、モデルが作るどんなカテゴリも可能にする"}, {"k": "B", "en": "Update the enum every week by appending each newly discovered category as it appears in production.", "ja": "本番で新しく現れるカテゴリを毎週その都度追記して enum を更新する"}, {"k": "C", "en": "Reject any document that does not match one of the 12 categories and queue it for manual data entry.", "ja": "12 カテゴリのいずれにも合わないドキュメントを拒否し手動データ入力のキューに回す"}, {"k": "D", "en": "Add an `\"other\"` enum value paired with a free-text detail field, plus an `\"unclear\"` value for genuinely ambiguous cases.", "ja": "詳細を捕捉する自由記述フィールドと組み合わせた `\"other\"` enum 値を追加し、本当に曖昧なケース用に `\"unclear\"` 値も加える"}], "correct": "D", "explain_ja": "公式のスキーマ設計パターン: 拡張可能なカテゴリは enum + `\"other\"` ＋詳細文字列、曖昧ケースには `\"unclear\"`。構造（enum の利点）と拡張性を両立する。A は構造を捨てて下流の型処理を壊す、B は追いつかないいたちごっこ、C は自動化率を自ら下げる。", "refs": "[facts-sheet「捏造防止のスキーマ設計」/ TS 4.3]"}, {"id": "S6-Q10", "scenario": "S6", "domain": "D4", "ts": "4.4", "stem_en": "Invoices sometimes contain internally inconsistent data: the stated total does not match the sum of line items (vendor errors). Your pipeline must not silently propagate either number. What is the right extraction design?", "stem_ja": "請求書には内部的に一貫しないデータが含まれることがある: 記載された総額が明細の合計と一致しない（ベンダー側のミス）。パイプラインはどちらの数値も黙って下流に流してはならない。正しい抽出設計は？", "choices": [{"k": "A", "en": "Always trust the stated total and record only that value, since it is the amount the vendor intended to charge.", "ja": "ベンダーが請求しようとした金額である記載総額を常に信頼し、その値だけを記録する"}, {"k": "B", "en": "Extract a `calculated_total` (summed from line items) alongside the `stated_total` and set a `conflict_detected` boolean when the two disagree.", "ja": "`stated_total`（記載値）と並んで明細から合計した `calculated_total`（計算値）を抽出し、両者が不一致のとき `conflict_detected` boolean を立てる"}, {"k": "C", "en": "Always recompute the total from the line items and discard the stated value as unreliable vendor input.", "ja": "常に明細から総額を再計算し、記載値は信頼できないベンダー入力として破棄する"}, {"k": "D", "en": "Reject any invoice where the two numbers disagree and return an extraction error so the document is not processed.", "ja": "2 つの数値が一致しない請求書を拒否し、そのドキュメントが処理されないよう抽出エラーを返す"}], "correct": "B", "explain_ja": "公式の自己修正バリデーションフロー: 両方の値＋矛盾フラグを構造化して下流に判断材料を渡す。A・C はどちらか一方を黙って選ぶ（恣意的選択——ソース矛盾の扱いの原則に反する）、D は「矛盾の検出」という有用な結果を「失敗」に変えてしまう。", "refs": "[TS 4.4 / anti-patterns D5-11 と同根]"}, {"id": "S6-Q11", "scenario": "S6", "domain": "D5", "ts": "5.5", "stem_en": "You have capacity to review only 15% of extractions by hand. How should you select which extractions get human review?", "stem_ja": "手作業でレビューできるのは抽出の 15% だけの能力しかない。どの抽出を人間のレビューに回すべきか？", "choices": [{"k": "A", "en": "Have the model output field-level confidence scores, calibrate review thresholds using a labeled validation set, and route low-confidence or ambiguous-source extractions to review.", "ja": "モデルにフィールドレベルの確信度スコアを出力させ、ラベル付き検証セットでレビュー閾値を較正し、低確信度またはソースが曖昧・矛盾している抽出をレビューにルーティング"}, {"k": "B", "en": "Review a flat 15% random sample drawn uniformly across the corpus so that every extraction has an equal probability of being checked.", "ja": "コーパス全体から一様に取った一律 15% のランダムサンプルをレビューし、全抽出が等確率でチェックされるようにする"}, {"k": "C", "en": "Review the longest documents first, on the reasoning that more text means more places for the extractor to make a mistake.", "ja": "テキストが多いほど抽出ミスの箇所も増えるという理屈で、最長のドキュメントから優先的にレビューする"}, {"k": "D", "en": "Ask the model to flag an extraction as \"needs review\" whenever it feels uncertain about its own output, and review exactly those flagged items.", "ja": "自身の出力に不確かさを感じたらモデルに抽出を \"needs review\" とフラグさせ、フラグされたものだけをレビューする"}], "correct": "A", "explain_ja": "公式パターン: フィールドレベル確信度＋**ラベル付き検証セットでの較正**＋低確信度・曖昧ソースの優先ルーティング。較正ステップが肝で、これが D（未較正の自己申告——信頼できない）との違い。B は限られた能力をリスクと無関係に配分、C は根拠のないヒューリスティック。", "refs": "[anti-patterns D5-5 / TS 5.5]"}, {"id": "S6-Q12", "scenario": "S6", "domain": "D4", "ts": "4.5", "stem_en": "You are about to batch-process 50,000 documents with a newly written extraction prompt. What should you do first to control costs?", "stem_ja": "新しく書いた抽出プロンプトで 50,000 ドキュメントをバッチ処理しようとしている。コスト制御のためにまず何をすべきか？", "choices": [{"k": "A", "en": "Refine the prompt on a small sample set until first-pass success is high, then submit the full batch.", "ja": "小さなサンプルセットでプロンプトを改善して初回成功率を高めてから、フルバッチを提出する"}, {"k": "B", "en": "Submit all 50,000 documents immediately, relying on the batch API's 50% discount to keep total costs under control without any pre-testing.", "ja": "事前テストなしに 50,000 件を直ちに提出し、batch API の 50% 割引が総コストを抑えてくれると当て込む"}, {"k": "C", "en": "Submit the full 50,000-document batch five times in parallel with five different prompt variants and keep whichever set of results scores best.", "ja": "5 種類のプロンプトバリアントで 50,000 件のフルバッチを 5 並列で提出し、最もスコアの良い結果セットを残す"}, {"k": "D", "en": "Process the first 50,000 synchronously to get faster turnaround feedback, then switch to the batch API only for subsequent runs.", "ja": "より速いフィードバックのため最初の 50,000 件は同期処理し、以後の実行からのみ batch API に切り替える"}], "correct": "A", "explain_ja": "公式パターン: 大量バッチの前にサンプルセットでプロンプトを改善し、初回成功率を最大化して反復的な再提出コストを削減する。B は未検証プロンプトの大量投入（失敗の山＋再提出地獄）、C はコスト 5 倍の力技、D は割引を捨てて倍のコストで「テスト」する本末転倒。", "refs": "[anti-patterns D4-9 / TS 4.5]"}], "log": [{"date": "2026-06-21", "id": "S4-Q1", "result": "✓", "choice": "", "time": "144s", "memo": ""}, {"date": "2026-06-21", "id": "S6-Q1", "result": "✓", "choice": "", "time": "160s", "memo": "lookup: fabricating"}, {"date": "2026-06-21", "id": "S2-Q9", "result": "✗", "choice": "", "time": "127s", "memo": "plan mode選択。理由「stack traceはヒントで自分でも調査すべき/呼び出し元がNPE期待なら危険」。実務判断は妥当だが、問題文の限定語(明確なtrace/単一ファイル/原因明確)が揃う＝direct execution誘導のシグナル。caller懸念に対応する選択肢も試験は過剰として✗。"}, {"date": "2026-06-21", "id": "S1-Q2", "result": "✓", "choice": "", "time": "87s", "memo": ""}, {"date": "2026-06-21", "id": "S3-Q2", "result": "✓", "choice": "", "time": "157s", "memo": " const Q = DATA.questions, IMPORTED = DATA.log, VOCAB = DATA.vocab;

// ---- 永続化（端末内）----
function load(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} }
function save(s){ localStorage.setItem(LS, JSON.stringify(s)); }
let store = load();
store.attempts = store.attempts || [];   // {date,id,result,choice,time,memo}
store.lookups  = store.lookups  || [];   // 後で調べる単語 [{word,src}]

save(store);

// 全履歴（インポート + ローカル）を時系列順に
function allAttempts(){ return IMPORTED.concat(store.attempts); }
function lastResultById(){
  const m = {};
  for(const a of allAttempts()){ if(a.id) m[a.id] = a.result; }
  return m;
}
function seenIds(){ const s=new Set(); for(const a of allAttempts()) if(a.id) s.add(a.id); return s; }

// ---- 出題セット構築 ----
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildSet(mode, count){
  let pool;
  if(mode==="wrong"){
    const last = lastResultById();
    pool = shuffle(Q.filter(q=>last[q.id]==="✗"));
    return pool; // wrong は全部
  }
  if(mode.startsWith("S")){
    pool = shuffle(Q.filter(q=>q.scenario===mode));
    return count?pool.slice(0,count):pool;
  }
  // all = 未出題優先 → 未克服誤答 → 正解済み(古い順)
  const seen = seenIds();
  const last = lastResultById();
  const unseen = shuffle(Q.filter(q=>!seen.has(q.id)));
  const wrong  = shuffle(Q.filter(q=>seen.has(q.id)&&last[q.id]==="✗"));
  const ok     = shuffle(Q.filter(q=>seen.has(q.id)&&last[q.id]==="✓"));
  pool = unseen.concat(wrong, ok);
  return pool.slice(0, count||10);
}

function start(mode,cnt){
  const set = buildSet(mode,cnt);
  if(!set.length){ alert("該当する問題がありません"); return; }
  S = {set, idx:0, results:[], mode};
  question();
}

let timerId=null, t0=0;
function question(){
  const q = S.set[S.idx];
  clearInterval(timerId);
  app.innerHTML = `
  <div class="toolbar">
    <button id="quit" class="sm">✕ 中断</button>

    <div class="ja hide" id="stemja">${esc(q.stem_ja)}</div>

    <div id="choices"></div>
  </div>`;
  const cdiv = document.getElementById("choices");

    if(el){ el.textContent=s+"s"; el.className="timer sm "+(s>TARGET?"time-ng":""); }
  },250);
}

function answer(picked){
  clearInterval(timerId);
  const q=S.set[S.idx];
  const secs=Math.round((Date.now()-t0)/1000);
  const ok = picked===q.correct;
  const res = {date: today(), id:q.id, result: ok?"✓":"✗", choice:picked, time:secs+"s", memo:""};
  // ロック＆採点表示
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    const k=b.dataset.k;
    if(k===q.correct) b.classList.add("correct");
    else if(k===picked) b.classList.add("wrong");
    else b.classList.add("dim");
    const c=q.choices.find(x=>x.k===k);
    b.innerHTML=`<span class="k">${k}${k===q.correct?" ✅":""}</span>`+
      `<span class="en">${esc(c.en)}</span><div class="ja">→ ${esc(c.ja)}</div>`;
  });
  const stem=document.getElementById("stem");
  document.getElementById("stemja").classList.remove("hide");
  document.getElementById("trBtn").classList.add("hide");

  const card=app.querySelector(".card");
  const v=document.createElement("div");
  v.innerHTML=`
    <div class="verdict ${ok?"ok":"ng"}">${ok?"✓ 正解":"✗ 不正解"} : ${q.correct}
      <span class="sm ${secs>TARGET?"time-ng":"time-ok"}">／ ${secs}s${secs>TARGET?" (超過)":""}</span></div>
    <div class="explain"><b>解説</b><br>${esc(q.explain_ja)}
      ${q.refs?`<div class="refs">→ ${esc(q.refs)}</div>`:""}</div>
    ${ok?"":`<div class="sm mut">なぜその肢を選んだか（任意・後で復習用）</div>
      <input type="text" id="memo" placeholder="例: 限定語を見落とした…">`}
    <div class="btn-row" style="margin-top:14px">
      <button class="primary" id="next">${S.idx+1<S.set.length?"次へ ▶":"結果を見る"}</button>
    </div>`;
  card.appendChild(v);
  const memoEl=document.getElementById("memo");
  document.getElementById("next").onclick=()=>{
    if(memoEl) res.memo=memoEl.value.trim();
    commit(res);
    S.idx++;
    if(S.idx<S.set.length) question(); else summary(false);
  };
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function commit(res){
  S.results.push(res);
  store.attempts.push(res);
  save(store);
}

function summary(interrupted){
  clearInterval(timerId);
  const r=S.results;
  const n=r.length, ok=r.filter(x=>x.result==="✓").length;
  const times=r.map(x=>parseInt(x.time)).filter(x=>!isNaN(x));
  const avg=times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):0;
  const over=times.filter(x=>x>TARGET).length;
  // ドメイン別誤答
  const byDom={};
  for(const x of r){ const q=Q.find(z=>z.id===x.id); const d=q?q.domain:"?";
    byDom[d]=byDom[d]||{n:0,ng:0}; byDom[d].n++; if(x.result==="✗")byDom[d].ng++; }
  const domRows=Object.entries(byDom).sort().map(([d,v])=>
    `<tr><td>${d}</td><td>${v.n-v.ng}/${v.n}</td></tr>`).join("");
  app.innerHTML=`
  <h1>${interrupted?"中断":"セッション終了"}</h1>
  <div class="grid" style="margin:12px 0">
    <div class="stat"><b>${n?Math.round(ok/n*100):0}%</b><span class="mut sm">正答率</span></div>
    <div class="stat"><b>${ok}/${n}</b><span class="mut sm">正答</span></div>
    <div class="stat"><b>${avg}s</b><span class="mut sm">平均</span></div>
    <div class="stat"><b>${over}</b><span class="mut sm">120s超</span></div>
  </div>
  <div class="card sm"><b>ドメイン別</b>
    <table style="width:100%;margin-top:6px"><tbody>${domRows||""}</tbody></table></div>
  <div class="btn-row">
    <button class="primary" id="home">ホームへ</button>
    <button id="exp">📤 エクスポート</button>
  </div>`;
  document.getElementById("home").onclick=home;
  document.getElementById("exp").onclick=exportView;
}

// ---- エクスポート（log.md / vocab.md 互換 Markdown）----
function exportView(){
  const a=store.attempts;
  let log = a.length
    ? a.map(x=>`| ${x.date} | ${x.id} | ${x.result} | ${x.choice} | ${x.time} | ${x.memo||""} |`).join("\n")
    : "(まだありません)";
  let look = store.lookups.length
    ? store.lookups.map(x=>`- ${x.word}${x.src?` (${x.src})`:""}`).join("\n")
    : "(なし)";
  const txt =
`# ドリル結果（アプリ書き出し / ${today()}）

## log.md に追記する行
\`\`\`
${log}
\`\`\`

## 後で調べる単語
${look}
`;
  app.innerHTML=`
  <div class="toolbar"><button id="back" class="sm">← 戻る</button>
    <span class="sm mut">エクスポート</span><span></span></div>
  <div class="card sm">この内容を Claude セッションに貼れば、母艦リポジトリの
    <code>results/log.md</code> 等へ追記コミットできます。</div>
  <textarea id="ta" readonly>${esc(txt)}</textarea>
  <div class="btn-row">
    <button class="primary" id="copy">📋 コピー</button>
    <button id="clear">🗑 端末履歴をクリア</button>
  </div>`;
  document.getElementById("back").onclick=home;
  document.getElementById("copy").onclick=async()=>{
    try{ await navigator.clipboard.writeText(txt); document.getElementById("copy").textContent="✓ コピーした"; }
    catch(e){ document.getElementById("ta").select(); }
  };
  document.getElementById("clear").onclick=()=>{
    if(confirm("端末内の今回分の履歴を消去します（インポート済みの過去ログは残ります）。コミット済みか確認しましたか？")){
      store.attempts=[]; store.lookups=[]; store.newVocab=[]; save(store); home();
    }
  };
}

function lookupView(){
  app.innerHTML=`
  <div class="toolbar"><button id="back" class="sm">← 戻る</button>
    <span class="sm mut">後で調べる単語</span><span></span></div>
  <div class="card sm">
    ${store.lookups.length?store.lookups.map(x=>`<div>• ${esc(x.word)} <span class="mut xs">${esc(x.src||"")}</span></div>`).join(""):"<span class='mut'>まだありません。問題画面の📖から追加できます。</span>"}
  </div>
  <div class="btn-row"><button class="primary" id="home2">ホームへ</button></div>`;
  document.getElementById("back").onclick=home;
  document.getElementById("home2").onclick=home;
}

// ---- 単語帳（内蔵辞書 + 後で調べる追加）----
document.getElementById("dictBtn").onclick=dictView;
function dictView(){
  const cur = (S && S.set[S.idx]) ? S.set[S.idx].id : "";
  app.innerHTML=`
  <div class="toolbar"><button id="back" class="sm">← 戻る</button>
    <span class="sm mut">単語帳 (${VOCAB.length}語)</span><span></span></div>
  <div class="card">
    <input type="text" id="q" placeholder="単語を検索…">
    <div id="hits" style="margin-top:10px"></div>
    <div class="sm mut" style="margin-top:12px">辞書にない単語は「後で調べる」に登録（その場の定義はオフラインでは出せません）</div>
    <div class="btn-row"><button id="add">＋「後で調べる」に追加</button></div>
  </div>`;
  document.getElementById("back").onclick=()=> S?question():home();
  const hits=document.getElementById("hits");
  function render(term){
    term=(term||"").toLowerCase();
    const found=VOCAB.filter(v=>!term||v.word.toLowerCase().includes(term)||(v.ja||"").includes(term));
    hits.innerHTML=found.length?found.map(v=>`
      <div class="card" style="margin:8px 0">
        <b>${esc(v.word)}</b> <span class="mut">${esc(v.ja)}</span>
        <div class="ja">${esc(v.nuance)}</div>
        ${v.example?`<div class="xs" style="margin-top:4px">${esc(v.example)}</div>`:""}
        <div class="xs mut">${esc(v.src)}</div>
      </div>`).join(""):"<span class='mut sm'>該当なし</span>";
  }
  render("");
  const qin=document.getElementById("q");
  qin.oninput=()=>render(qin.value);
  document.getElementById("add").onclick=()=>{
    const w=qin.value.trim(); if(!w) return;
    store.lookups.push({word:w, src:cur}); save(store);
    document.getElementById("add").textContent="✓ 追加した: "+w;
  };
}

function today(){ const d=new Date(); const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

home();
</script>
</body>
</html>
